<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商品竞品分析 Agent 协作工作台</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #182033;
      --muted: #667085;
      --line: #dbe3ef;
      --blue: #3157d5;
      --blue-soft: #eaf0ff;
      --green: #16845b;
      --green-soft: #e8f7f1;
      --amber: #b46b08;
      --amber-soft: #fff4dd;
      --red: #c43d5e;
      --red-soft: #ffe8ee;
      --gray-soft: #eef2f7;
      --shadow: 0 18px 42px rgba(31, 42, 68, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(180deg, rgba(49, 87, 213, 0.08), rgba(246, 248, 251, 0) 280px), var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px clamp(18px, 4vw, 44px);
      background: rgba(246, 248, 251, 0.92);
      border-bottom: 1px solid rgba(219, 227, 239, 0.88);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 246px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      color: #fff;
      background: #3157d5;
      border-radius: 8px;
      font-weight: 850;
      font-size: 14px;
      box-shadow: 0 10px 22px rgba(49, 87, 213, 0.18);
    }

    .brand strong {
      display: block;
      font-size: 15px;
      line-height: 1.2;
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .workspace-status {
      display: grid;
      grid-template-columns: minmax(170px, 1fr) minmax(170px, 1fr);
      gap: 7px 16px;
      min-width: 320px;
      max-width: 600px;
      color: #344054;
      font-size: 13px;
      flex: 1;
    }

    .workspace-status b { color: var(--ink); }

    .run-indicator {
      grid-column: 1 / -1;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: #e8edf6;
    }

    .run-indicator-fill {
      width: var(--run-progress, 0%);
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), #0f91b8);
      transition: width 260ms ease;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-pill {
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      color: #344054;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 8px 18px rgba(31, 42, 68, 0.04);
    }

    .nav-pill.active {
      color: var(--blue);
      border-color: rgba(49, 87, 213, 0.38);
      background: var(--blue-soft);
    }

    main {
      width: min(1440px, calc(100vw - 34px));
      margin: 0 auto;
      padding: 26px 0 48px;
    }

    .page { display: none; animation: rise 220ms ease both; }
    .page.active { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .demo-note {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      color: #1e409b;
      background: var(--blue-soft);
      border: 1px solid rgba(49, 87, 213, 0.2);
      font-size: 12px;
      font-weight: 800;
    }

    .workbench {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 340px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .side-panel, .context-panel {
      position: sticky;
      top: 92px;
      padding: 18px;
    }

    .center-stack {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .main-task-content {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .main-card {
      padding: clamp(18px, 3vw, 28px);
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.14;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 8px;
      font-size: 19px;
      line-height: 1.28;
      letter-spacing: 0;
    }

    h3 {
      margin-bottom: 8px;
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    p, li {
      color: #475467;
      line-height: 1.62;
      font-size: 14px;
    }

    .muted { color: var(--muted); }

    .task-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .mini-card, .metric-card, .finding-card, .issue-card, .source-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
    }

    .mini-card {
      padding: 13px;
      display: grid;
      gap: 6px;
    }

    .mini-card b, .metric-card b, .finding-card b {
      color: var(--ink);
      font-size: 14px;
    }

    .mini-card span, .metric-card small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      color: #344054;
      font-size: 13px;
      font-weight: 800;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fbfcff;
      outline: none;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: rgba(49, 87, 213, 0.55);
      box-shadow: 0 0 0 3px rgba(49, 87, 213, 0.11);
    }

    .attachment-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      border: 1px dashed rgba(49, 87, 213, 0.42);
      border-radius: 8px;
      background: #f9fbff;
    }

    .button-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #344054;
      background: #fff;
      font-weight: 800;
      text-decoration: none;
    }

    .btn.primary {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .btn.subtle {
      color: var(--blue);
      background: var(--blue-soft);
      border-color: rgba(49, 87, 213, 0.22);
    }

    .text-button {
      padding: 0;
      color: var(--blue);
      background: transparent;
      border: 0;
      font-weight: 800;
    }

    .agent-list {
      display: grid;
      gap: 10px;
    }

    .agent-node {
      width: 100%;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      background: #fbfcff;
      text-align: left;
      color: inherit;
    }

    .agent-node.active {
      border-color: rgba(49, 87, 213, 0.42);
      background: #f6f9ff;
      box-shadow: 0 12px 24px rgba(31, 42, 68, 0.06);
    }

    .agent-num {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: var(--accent);
      font-size: 12px;
      font-weight: 900;
    }

    .agent-node h3 {
      margin: 0 0 4px;
      font-size: 14px;
    }

    .agent-node p {
      margin: 0 0 8px;
      font-size: 12px;
      line-height: 1.45;
    }

    .agent-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .status-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      color: #344054;
      background: #f2f5fa;
      border: 1px solid #e2e8f2;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .status-tag.running {
      color: #1e409b;
      background: var(--blue-soft);
      border-color: rgba(49, 87, 213, 0.2);
    }

    .status-tag.done {
      color: #0f5d41;
      background: var(--green-soft);
      border-color: rgba(22, 132, 91, 0.2);
    }

    .status-tag.review {
      color: #7a4b07;
      background: var(--amber-soft);
      border-color: rgba(180, 107, 8, 0.18);
    }

    .status-tag.rework {
      color: #8a243e;
      background: var(--red-soft);
      border-color: rgba(196, 61, 94, 0.2);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric-card {
      padding: 13px;
      text-align: left;
      color: inherit;
    }

    .metric-card b {
      display: block;
      margin-bottom: 4px;
      font-size: 24px;
      line-height: 1;
    }

    .metric-card span {
      display: block;
      color: var(--ink);
      font-weight: 800;
      font-size: 13px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .finding-card {
      padding: 14px;
    }

    .finding-card p { margin-bottom: 0; }

    .risk-card {
      padding: 14px;
      border: 1px solid rgba(180, 107, 8, 0.22);
      border-left: 4px solid var(--amber);
      border-radius: 8px;
      background: var(--amber-soft);
    }

    .risk-card.red {
      border-color: rgba(196, 61, 94, 0.22);
      border-left-color: var(--red);
      background: var(--red-soft);
    }

    .risk-card.green {
      border-color: rgba(22, 132, 91, 0.22);
      border-left-color: var(--green);
      background: var(--green-soft);
    }

    .risk-card b {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
    }

    .matrix {
      width: 100%;
      border-collapse: collapse;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
    }

    .matrix th, .matrix td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    .matrix th {
      color: #344054;
      background: #f3f6fb;
      font-weight: 850;
    }

    .matrix tr:last-child td { border-bottom: 0; }

    .cell-ok { color: var(--green); font-weight: 850; }
    .cell-mid { color: var(--amber); font-weight: 850; }
    .cell-bad { color: var(--red); font-weight: 850; }

    .bar-chart {
      display: grid;
      gap: 9px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) 44px;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: #344054;
    }

    .bar-bg {
      height: 10px;
      border-radius: 999px;
      background: #e9eef6;
      overflow: hidden;
    }

    .bar {
      width: var(--value);
      height: 100%;
      border-radius: 999px;
      background: var(--accent, var(--blue));
    }

    .heatmap {
      display: grid;
      grid-template-columns: 120px repeat(5, minmax(72px, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      font-size: 12px;
    }

    .heatmap div {
      padding: 10px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .heatmap div:nth-child(6n) { border-right: 0; }
    .heatmap .head { color: #344054; background: #f3f6fb; font-weight: 850; }
    .heatmap .ok { background: #e8f7f1; color: #0f5d41; font-weight: 850; }
    .heatmap .mid { background: #fff4dd; color: #7a4b07; font-weight: 850; }
    .heatmap .bad { background: #ffe8ee; color: #8a243e; font-weight: 850; }

    .quadrant {
      position: relative;
      min-height: 290px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 49.8%, var(--line) 50%, transparent 50.2%),
        linear-gradient(0deg, transparent 49.8%, var(--line) 50%, transparent 50.2%),
        #fff;
      overflow: hidden;
    }

    .axis-label {
      position: absolute;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .axis-x { left: 12px; bottom: 8px; }
    .axis-y { left: 12px; top: 8px; }

    .point {
      position: absolute;
      left: var(--x);
      bottom: var(--y);
      max-width: 150px;
      transform: translate(-50%, 50%);
      padding: 6px 8px;
      border-radius: 999px;
      color: #fff;
      background: var(--accent);
      font-size: 12px;
      font-weight: 850;
      white-space: normal;
      text-align: center;
      box-shadow: 0 8px 18px rgba(31, 42, 68, 0.16);
    }

    details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
    }

    summary {
      padding: 13px 14px;
      color: #344054;
      cursor: pointer;
      font-weight: 850;
    }

    details > div {
      padding: 0 14px 14px;
    }

    .context-list {
      display: grid;
      gap: 10px;
    }

    .source-card {
      width: 100%;
      padding: 12px;
      color: inherit;
      text-align: left;
    }

    .source-card small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      line-height: 1.45;
    }
    .source-card.clickable {
      cursor: pointer;
      border: 1px solid var(--line);
      border-radius: 8px;
      transition: all 150ms ease;
    }
    .source-card.clickable:hover {
      background: #f0f5ff;
      border-color: var(--blue);
      box-shadow: 0 2px 8px rgba(49,87,213,0.1);
    }

    .user-feedback {
      display: grid;
      gap: 10px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .feedback-record {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
      color: #344054;
      font-size: 13px;
      line-height: 1.5;
    }

    .issue-list {
      display: grid;
      gap: 10px;
    }

    .orchestrator-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .handoff-note {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--blue);
      border-radius: 8px;
      background: #fbfcff;
      color: #344054;
      font-size: 13px;
      line-height: 1.5;
    }

    .run-record {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
      color: #344054;
      font-size: 13px;
      line-height: 1.5;
    }

    .version-row {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
    }

    .contract-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .issue-card {
      padding: 13px;
    }

    .report-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: start;
    }

    .report-main, .report-side {
      padding: clamp(18px, 3vw, 28px);
    }

    .report-main h2 {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .report-main h2:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .evidence-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      background: rgba(24, 32, 51, 0.34);
    }

    .evidence-overlay.open { display: block; }

    .evidence-drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 50;
      width: min(620px, 100vw);
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #fff;
      box-shadow: -22px 0 44px rgba(31, 42, 68, 0.18);
      transform: translateX(102%);
      transition: transform 220ms ease;
    }

    .evidence-drawer.open { transform: translateX(0); }

    .drawer-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .drawer-title-wrap { flex: 1; }
    .drawer-title-wrap h2 { margin: 0 0 4px; }
    .drawer-title-wrap p { margin: 0; font-size: 13px; }

    .drawer-close, .drawer-back {
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #344054;
      font-weight: 850;
    }

    .drawer-back { display: none; }
    .drawer-back.visible { display: inline-flex; align-items: center; }

    .drawer-body {
      overflow: auto;
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .drawer-section {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
    }

    .drawer-section h3 { margin-bottom: 6px; }
    .drawer-section p { margin-bottom: 8px; }
    .drawer-section ol { margin: 8px 0 0; padding-left: 20px; }

    .drawer-feedback {
      display: none;
      padding: 12px 14px;
      border: 1px solid rgba(22, 132, 91, 0.22);
      border-radius: 8px;
      color: #0f5d41;
      background: var(--green-soft);
    }

    .drawer-feedback.visible { display: block; }

    .source-link {
      color: var(--blue);
      font-weight: 800;
      word-break: break-all;
    }

    /* === Part 3: Product Info Cards === */
    .product-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .product-info-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
      padding: 14px;
      display: grid;
      gap: 6px;
      font-size: 13px;
      position: relative;
    }
    .product-info-card.ours {
      border-color: rgba(49, 87, 213, 0.35);
      background: #f6f9ff;
    }
    .product-info-card .pic-name {
      font-size: 14px;
      font-weight: 850;
      color: var(--ink);
    }
    .product-info-card .pic-price {
      font-size: 18px;
      font-weight: 900;
      color: var(--blue);
    }
    .product-info-card .pic-row {
      display: flex;
      gap: 6px;
      align-items: baseline;
      color: #475467;
      line-height: 1.5;
    }
    .product-info-card .pic-label {
      color: var(--muted);
      font-size: 12px;
      min-width: 56px;
      flex-shrink: 0;
    }
    .product-info-card .pic-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }
    .pic-tag.good { background: var(--green-soft); color: var(--green); }
    .pic-tag.bad { background: var(--red-soft); color: var(--red); }

    /* === Part 3: Comparison Scale Tables === */
    .compare-scale {
      margin-bottom: 18px;
    }
    .compare-scale h3 {
      margin-bottom: 8px;
      font-size: 15px;
      color: var(--ink);
      border-left: 3px solid var(--blue);
      padding-left: 8px;
    }
    .compare-scale .matrix th:first-child {
      min-width: 110px;
    }

    /* === Part 4: Ranking === */
    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-weight: 900;
      font-size: 13px;
      color: #fff;
    }
    .rank-1 { background: #f59e0b; }
    .rank-2 { background: #6b7280; }
    .rank-3 { background: #b45900; }
    .rank-other { background: #cbd5e1; color: #475467; }
    .matrix th, .matrix td { padding: 8px 6px; }
    .tip {
      position: relative;
      cursor: help;
    }
    .tip::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1f2a44;
      color: #fff;
      font-size: 13px;
      font-weight: 400;
      padding: 8px 12px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
      width: 320px;
      white-space: normal;
      line-height: 1.5;
      text-align: left;
    }
    .tip:hover::after { opacity: 1; }
    .recommend-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 800;
    }
    .recommend-enter { background: var(--green-soft); color: var(--green); }
    .recommend-consider { background: var(--blue-soft); color: var(--blue); }
    .recommend-caution { background: var(--amber-soft); color: var(--amber); }
    .recommend-no { background: var(--red-soft); color: var(--red); }

    /* === Part 4: Pain Point Heatmap === */
    .painpoint-grid {
      display: grid;
      grid-template-columns: 72px repeat(6, minmax(90px, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      font-size: 12px;
    }
    .painpoint-grid div {
      padding: 8px 10px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fff;
      line-height: 1.4;
    }
    .painpoint-grid div:nth-child(7n) { border-right: 0; }
    .painpoint-grid .pp-head { color: #344054; background: #f3f6fb; font-weight: 850; }
    .painpoint-grid .pp-high { background: #ffe8ee; color: #8a243e; font-weight: 700; }
    .painpoint-grid .pp-mid { background: #fff4dd; color: #7a4b07; font-weight: 700; }
    .painpoint-grid .pp-low { background: #e8f7f1; color: #0f5d41; font-weight: 700; }

    /* === Part 4: BCG Matrix === */
    .bcg-matrix {
      position: relative;
      min-height: 320px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 49.8%, var(--line) 50%, transparent 50.2%),
        linear-gradient(0deg, transparent 49.8%, var(--line) 50%, transparent 50.2%),
        #fff;
      overflow: hidden;
    }
    .bcg-label {
      position: absolute;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      pointer-events: none;
    }
    .bcg-quadrant-label {
      position: absolute;
      font-size: 13px;
      font-weight: 850;
      color: #94a3b8;
      pointer-events: none;
    }
    .bcg-point {
      position: absolute;
      transform: translate(-50%, 50%);
      padding: 6px 10px;
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(31, 42, 68, 0.16);
    }

    /* === Part 4: SWOT === */
    .swot-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .swot-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcff;
    }
    .swot-card h4 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    .swot-card .swot-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 13px;
      border-bottom: 1px dashed var(--line);
    }
    .swot-card .swot-item:last-child { border-bottom: 0; }
    .swot-score {
      font-weight: 900;
      font-size: 14px;
    }

    /* === Part 4: Differentiation === */
    .diff-list {
      display: grid;
      gap: 8px;
    }
    .diff-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
      font-size: 13px;
    }
    .diff-priority {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 800;
    }
    .diff-p0 { background: var(--red-soft); color: var(--red); }
    .diff-p1 { background: var(--amber-soft); color: var(--amber); }
    .diff-p2 { background: var(--blue-soft); color: var(--blue); }

    /* === Collecting Stage: Skill Progress === */
    .skill-progress-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 14px 0;
    }
    .skill-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcff;
    }
    .skill-card .skill-name {
      font-weight: 800;
      font-size: 13px;
      display: block;
      margin-bottom: 4px;
    }
    .skill-card .skill-target {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .skill-bar {
      height: 8px;
      border-radius: 999px;
      background: #e9eef6;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .skill-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 400ms ease;
    }
    .skill-progress-label {
      font-size: 12px;
      font-weight: 800;
    }
    .skill-action-text {
      font-size: 12px;
      color: #475467;
      margin-top: 4px;
      line-height: 1.4;
      padding: 6px 8px;
      background: #f3f6fb;
      border-radius: 4px;
    }
    .collecting-progress-huge {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
    }
    .collecting-progress-huge .big-num {
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
      color: var(--blue);
    }
    .collecting-progress-huge .big-bar {
      flex: 1;
      height: 12px;
      border-radius: 999px;
      background: #e9eef6;
      overflow: hidden;
    }
    .collecting-progress-huge .big-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), #0f91b8);
      transition: width 400ms ease;
    }
    .board-status-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin: 12px 0;
    }
    .board-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 13px;
      background: #fbfcff;
    }
    .blocker-panel {
      border: 1px solid rgba(196, 61, 94, 0.3);
      border-left: 4px solid var(--red);
      border-radius: 8px;
      padding: 16px;
      background: var(--red-soft);
      margin: 12px 0;
    }

    /* === Collecting: Source Binding Badge === */
    .source-binding {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      background: var(--blue-soft);
      color: var(--blue);
      cursor: pointer;
      border: 1px solid rgba(49,87,213,0.15);
      transition: background 150ms ease;
    }
    .source-binding:hover { background: rgba(49,87,213,0.18); }

    /* === Collecting: Blocked Board Table === */
    .blocked-board-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      font-size: 13px;
      margin: 10px 0;
    }
    .blocked-board-table th {
      padding: 10px 12px;
      text-align: left;
      background: #f3f6fb;
      color: #344054;
      font-weight: 850;
      border-bottom: 1px solid var(--line);
    }
    .blocked-board-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }
    .blocked-board-table tr:last-child td { border-bottom: 0; }
    .blocked-board-table tr.has-issue td { background: var(--red-soft); }

    /* === Collecting: Executing Current Activity === */
    .current-activity-card {
      padding: 14px;
      border: 1px solid rgba(49,87,213,0.25);
      border-left: 4px solid var(--blue);
      border-radius: 8px;
      background: var(--blue-soft);
      margin: 10px 0;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 14px;
      align-items: baseline;
    }
    .current-activity-card .ca-label {
      grid-column: 1 / -1;
      font-size: 11px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .current-activity-card .ca-row {
      display: contents;
    }
    .current-activity-card .ca-row b {
      color: var(--ink);
      font-weight: 600;
      white-space: nowrap;
      text-align: right;
      padding-right: 4px;
    }
    .current-activity-card .ca-row span {
      color: #344054;
      font-size: 13px;
      line-height: 1.5;
    }

    /* === Collecting: Demo Console (sidebar only) === */
    .demo-console {
      padding: 10px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #f8f9fb;
      margin-bottom: 10px;
    }
    .demo-console-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .demo-console-btns {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4px;
    }
    .demo-console-btn {
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-size: 11px;
      font-weight: 700;
      color: #475467;
      cursor: pointer;
      text-align: left;
      transition: all 150ms ease;
    }
    .demo-console-btn:hover { border-color: var(--blue); color: var(--blue); }
    .demo-console-btn.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }
    .demo-console-btn .dc-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      flex-shrink: 0;
    }

    /* === Collecting Stage: Enhanced UI for State 2 & 3 === */
    /* Header area */
    .cs-header { margin-bottom: 16px; }
    .cs-title {
      font-size: 24px;
      font-weight: 850;
      line-height: 1.3;
      margin: 0 0 6px 0;
      color: var(--ink);
    }
    .cs-title.cs-title-success { color: var(--green); }
    .cs-title.cs-title-blocked { color: var(--red); }
    .cs-subtitle {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      margin: 0;
    }

    /* Status banner */
    .cs-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      margin: 14px 0;
      line-height: 1.5;
    }
    .cs-banner-success {
      background: var(--green-soft);
      border: 1px solid rgba(22, 132, 91, 0.22);
      color: var(--green);
    }
    .cs-banner-blocked {
      background: var(--red-soft);
      border: 1px solid rgba(196, 61, 94, 0.22);
      color: var(--red);
    }
    .cs-banner-icon {
      font-size: 18px;
      flex-shrink: 0;
      line-height: 1;
    }

    /* Enhanced Skill Card Grid (2x2) */
    .cs-skill-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 16px 0;
    }
    .cs-skill-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .cs-skill-card:hover {
      border-color: rgba(49,87,213,0.3);
      box-shadow: 0 4px 12px rgba(31,42,68,0.06);
    }
    .cs-skill-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }
    .cs-skill-name {
      font-size: 13.5px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.35;
      flex: 1;
    }
    .cs-skill-badge {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }
    .cs-skill-badge-done {
      background: var(--green-soft);
      color: var(--green);
      border: 1px solid rgba(22, 132, 91, 0.25);
    }
    .cs-skill-badge-blocked {
      background: var(--red-soft);
      color: var(--red);
      border: 1px solid rgba(196, 61, 94, 0.25);
    }
    .cs-skill-badge-warning {
      background: var(--amber-soft);
      color: var(--amber);
      border: 1px solid rgba(180, 107, 8, 0.25);
    }
    .cs-skill-progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .cs-skill-bar-wrap {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: #e9eef6;
      overflow: hidden;
    }
    .cs-skill-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 500ms ease;
    }
    .cs-skill-bar-fill.cs-bar-green { background: linear-gradient(90deg, var(--green), #27ae88); }
    .cs-skill-bar-fill.cs-bar-red { background: linear-gradient(90deg, var(--red), #e85a78); }
    .cs-skill-bar-fill.cs-bar-amber { background: linear-gradient(90deg, var(--amber), #d48a1d); }
    .cs-skill-pct {
      font-size: 13px;
      font-weight: 850;
      min-width: 38px;
      text-align: right;
    }
    .cs-skill-pct.cs-pct-green { color: var(--green); }
    .cs-skill-pct.cs-pct-red { color: var(--red); }
    .cs-skill-pct.cs-pct-amber { color: var(--amber); }
    .cs-skill-status-text {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .cs-skill-status-text.cs-st-green { color: var(--green); }
    .cs-skill-status-text.cs-st-red { color: var(--red); }
    .cs-skill-status-text.cs-st-amber { color: var(--amber); }
    .cs-skill-sources {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    /* Enhanced Blocker Detail Panel */
    .cs-blocker-panel {
      border: 1px solid rgba(196, 61, 94, 0.3);
      border-left: 4px solid var(--red);
      border-radius: 8px;
      padding: 18px 20px;
      background: linear-gradient(135deg, #fff5f7 0%, var(--red-soft) 100%);
      margin: 16px 0;
    }
    .cs-blocker-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 800;
      color: var(--red);
      margin-bottom: 14px;
    }
    .cs-blocker-fields {
      display: grid;
      gap: 10px;
      font-size: 13px;
      line-height: 1.6;
    }
    .cs-blocker-field {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 8px;
    }
    .cs-blocker-field-label {
      font-weight: 700;
      color: #555;
      white-space: nowrap;
    }
    .cs-blocker-field-value {
      color: #333;
    }
    .cs-blocker-evidence {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .cs-blocker-evidence .source-binding {
      background: var(--red-soft);
      color: var(--red);
      border-color: rgba(196, 61, 94, 0.25);
    }

    /* Warning items area */
    .cs-warnings-section { margin: 16px 0; }
    .cs-warnings-section h3 {
      font-size: 14.5px;
      margin: 0 0 10px 0;
      color: var(--ink);
    }
    .cs-warning-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(180, 107, 8, 0.2);
      border-left: 4px solid var(--amber);
      border-radius: 8px;
      background: var(--amber-soft);
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 8px;
    }
    .cs-warning-item:last-child { margin-bottom: 0; }
    .cs-warning-text b { color: var(--amber); }

    /* Action bar */
    .cs-action-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .cs-action-bar .btn-primary-purple {
      background: #7c3aed;
      color: #fff;
      border: 1px solid #7c3aed;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 150ms ease;
    }
    .cs-action-bar .btn-primary-purple:hover {
      background: #6d28d9;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.3);
    }

    /* === Check-style cards (SUCCESS_CONFIRMED, 无进度条) === */
    .cs-check-card {
      padding: 14px 16px;
    }
    .cs-check-card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .cs-check-circle {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
    }
    .cs-check-card-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* === Status Grid Cards (BLOCKED — 2×2 网格, 含进度条+来源) === */
    .cs-status-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin: 0;
    }
    .cs-status-grid-card {
      border-radius: 12px;
      padding: 16px 18px;
      background: #fff;
      border: 1px solid var(--line);
      transition: border-color 220ms ease, box-shadow 260ms ease, transform 200ms ease;
    }
    .cs-status-grid-card:hover {
      border-color: rgba(49,87,213,0.22);
      box-shadow: 0 4px 16px rgba(31,42,68,0.07);
      transform: translateY(-1px);
    }
    /* 阻塞卡片特殊样式 */
    .cs-sgc-blocked {
      background: linear-gradient(135deg, #fffbfc 0%, #fff5f7 100%);
      border-color: rgba(196,61,94,0.22);
    }
    .cs-sgc-blocked:hover {
      border-color: rgba(196,61,94,0.35);
      box-shadow: 0 4px 18px rgba(196,61,94,0.1);
    }
    /* 卡片头部：名称 + 徽章 */
    .cs-sgc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .cs-sgc-name {
      font-size: 14px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.35;
      flex: 1;
      min-width: 0;
    }
    .cs-sgc-badge {
      flex-shrink: 0;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 800;
      line-height: 1.3;
    }
    .cs-sgc-badge-green {
      background: var(--green-soft);
      color: var(--green);
      border: 1px solid rgba(22,132,91,0.22);
    }
    .cs-sgc-badge-red {
      background: var(--red-soft);
      color: var(--red);
      border: 1px solid rgba(196,61,94,0.25);
    }
    /* 进度条行 */
    .cs-sgc-progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .cs-sgc-bar-track {
      flex: 1;
      height: 9px;
      border-radius: 999px;
      background: #eef1f6;
      overflow: hidden;
    }
    .cs-sgc-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .cs-sgc-bar-green { background: linear-gradient(90deg, var(--green), #27ae88); }
    .cs-sgc-bar-red { background: linear-gradient(90deg, var(--red), #e85a78); }
    .cs-sgc-pct {
      font-size: 15px;
      font-weight: 900;
      min-width: 42px;
      text-align: right;
    }
    .cs-sgc-pct-green { color: var(--green); }
    .cs-sgc-pct-red { color: var(--red); }
    /* 详情文字（含来源指示） */
    .cs-sgc-detail {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .cs-sgc-detail span { margin-right: 3px; }
    .cs-sgc-detail-green { color: var(--green); }
    .cs-sgc-detail-red { color: var(--red); }
    /* 来源徽章区 */
    .cs-sgc-sources {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    /* === Part 4: Feature Comparison === */
    .feature-compare-table .score-cell {
      font-weight: 900;
      font-size: 15px;
      text-align: center;
    }
    .score-high { color: var(--green); }
    .score-mid { color: var(--amber); }
    .score-low { color: var(--red); }

    /* === Ch8: Chapter Conclusion === */
    .chapter-conclusion {
      margin: 18px 0 8px;
      padding: 16px;
      border: 1px solid rgba(49, 87, 213, 0.25);
      border-left: 4px solid var(--blue);
      border-radius: 8px;
      background: var(--blue-soft);
    }
    .chapter-conclusion > b {
      display: block;
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--ink);
    }
    .ch-c-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .ch-c-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      line-height: 1.5;
    }
    .ch-c-item b {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .ch-c-find b { color: var(--blue); }
    .ch-c-risk b { color: var(--red); }
    .ch-c-opp b { color: var(--green); }
    .ch-c-item p { margin: 0; font-size: 12px; }

    /* === Ch8: Evidence Tag === */
    .evidence-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
    }
    .evidence-tag:hover {
      background: rgba(49, 87, 213, 0.2);
    }

    /* === Ch8: Ours Row Highlight === */
    .ours-row td {
      background: #f6f9ff;
      font-weight: 600;
    }

    /* === Ch8: QA Summary === */
    .qa-summary h4 {
      margin: 12px 0 6px;
      font-size: 13px;
    }
    .qa-summary ul {
      margin: 0 0 8px;
      padding-left: 18px;
      font-size: 13px;
      color: #475467;
    }
    .qa-summary ul li {
      margin-bottom: 4px;
    }

    /* === v10: QA Dashboard === */
    .qa-dashboard { display: grid; gap: 16px; }
    .qa-overview {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 8px;
    }
    @media (max-width: 800px) {
      .qa-overview { grid-template-columns: 1fr; }
      .qa-stage-timeline { grid-template-columns: 1fr; }
    }
    .qa-gate-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      background: var(--panel);
      display: grid;
      gap: 8px;
      text-align: center;
    }
    .qa-gate-card .gate-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 22px;
      font-weight: 850;
      margin: 4px auto;
    }
    .qa-gate-score { font-size: 36px; font-weight: 900; line-height: 1; }
    .qa-stage-timeline {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .qa-stage-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: #fbfcff;
      display: grid;
      gap: 8px;
      align-content: start;
      cursor: pointer;
      transition: box-shadow 120ms ease, border-color 120ms ease;
    }
    .qa-stage-card:hover { box-shadow: var(--shadow); border-color: var(--blue); }
    .qa-stage-card.blocked { border-color: var(--red); background: var(--red-soft); }
    .qa-stage-card.warning { border-color: var(--amber); background: var(--amber-soft); }
    .qa-stage-card.pass { border-color: var(--green); }
    .qa-stage-num {
      width: 32px; height: 32px;
      display: grid; place-items: center;
      border-radius: 8px; font-weight: 850; font-size: 14px;
      color: #fff;
    }
    .qa-stage-num.pass { background: var(--green); }
    .qa-stage-num.warning { background: var(--amber); }
    .qa-stage-num.blocked { background: var(--red); }
    .qa-stage-num.pending { background: var(--muted); }
    .qa-stage-card h3 { margin: 0; font-size: 13px; font-weight: 700; }
    .qa-stage-card .qa-tag { font-size: 11px; font-weight: 800; }
    .qa-issue-list { display: grid; gap: 12px; margin-top: 12px; }
    .qa-issue-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      background: var(--panel);
      display: grid;
      gap: 8px;
    }
    .qa-issue-card.blocker { border-left: 4px solid var(--red); }
    .qa-issue-card.warning { border-left: 4px solid var(--amber); }
    .qa-issue-meta {
      display: flex; gap: 10px; flex-wrap: wrap;
      font-size: 12px; color: var(--muted);
    }
    .qa-issue-meta b { color: var(--ink); }
    .qa-fix-prompt {
      background: var(--blue-soft);
      border: 1px solid rgba(49, 87, 213, 0.18);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: #1e409b;
      line-height: 1.55;
    }
    .qa-fix-prompt::before { content: "AI修复建议："; font-weight: 800; }
    .qa-passed-list {
      display: flex; align-items: center; flex-wrap: wrap; gap: 12px; padding: 12px 0;
    }
    .qa-passed-list .qa-report-rules-btn {
      padding: 8px 18px;
      border: 1px solid var(--green);
      border-radius: 6px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 150ms ease;
    }
    .qa-passed-list .qa-report-rules-btn:hover {
      background: #d6f5e8;
      border-color: #12965a;
      color: #0f6b47;
    }
    .qa-passed-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--green-soft);
      color: var(--green);
      font-weight: 600;
    }

    /* === v12: transparent QA panel === */
    .qa-inline-panel { border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; margin-top: 12px; background: var(--panel); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .qa-inline-header {
      display: flex; align-items: center; gap: 12px; padding: 14px 22px;
      border-bottom: 1px solid var(--line); flex-wrap: wrap;
    }
    .qa-inline-status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 800;
    }
    .qa-inline-status-badge.pass { background: var(--green-soft); color: var(--green); }
    .qa-inline-status-badge.warning { background: var(--amber-soft); color: var(--amber); }
    .qa-inline-status-badge.block { background: var(--red-soft); color: var(--red); }
    .qa-inline-summary { font-size: 13px; color: var(--ink); flex: 1; }
    .qa-inline-body { padding: 16px 22px; }
    .qa-failed-rules { display: grid; gap: 10px; margin-bottom: 14px; }
    .qa-failed-rule-card {
      border: 1px solid var(--line); border-radius: 8px; padding: 12px 16px;
      background: #fbfcff; border-left: 4px solid var(--red);
    }
    .qa-failed-rule-card .rule-name { font-weight: 700; font-size: 13px; color: var(--red); margin-bottom: 4px; }
    .qa-failed-rule-card .rule-reason { font-size: 13px; color: #475467; line-height: 1.5; }
    .qa-passed-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--green); cursor: pointer;
      background: var(--green-soft); border: 1px solid rgba(22,132,91,0.18);
      padding: 6px 14px; border-radius: 999px; font-weight: 600;
      margin-bottom: 8px;
    }
    .qa-passed-toggle:hover { background: #d6f5e8; }
    .qa-rules-drawer-item {
      border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px;
    }
    .qa-rules-drawer-item.passed { border-left: 4px solid var(--green); background: var(--green-soft); }
    .qa-rules-drawer-item.failed { border-left: 4px solid var(--red); background: var(--red-soft); }

    .qa-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .qa-empty h3 { color: var(--ink); margin-bottom: 8px; }
    @media (max-width: 960px) {
      .qa-stage-timeline { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .qa-overview { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .qa-stage-timeline { grid-template-columns: 1fr; }
    }

    @media (max-width: 1180px) {
      .workbench, .report-layout {
        grid-template-columns: 1fr;
      }

      .side-panel, .context-panel {
        position: static;
      }

      .agent-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    /* === v12: QA Report Panel (阶段质检报告) === */
    .qa-report-header {
      padding: 20px 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, #fbfcff, #f6f9ff);
      margin-bottom: 16px;
    }
    .qa-report-header .qa-report-summary {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .qa-report-header .qa-report-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .qa-report-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 800;
    }
    .qa-report-badge.pass { background: var(--green-soft); color: var(--green); border: 1px solid rgba(22,132,91,0.2); }
    .qa-report-badge.warning { background: var(--amber-soft); color: var(--amber); border: 1px solid rgba(180,107,8,0.2); }
    .qa-report-badge.block { background: var(--red-soft); color: var(--red); border: 1px solid rgba(196,61,94,0.2); }
    .qa-report-rules-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 150ms ease;
    }
    .qa-report-rules-btn:hover {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    /* v12: 内嵌式三动作交互栏 */
    .qa-three-actions {
      display: grid;
      grid-template-columns: auto auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 14px 0 0;
      margin-top: 14px;
      border-top: 1px solid var(--line);
    }
    .qa-three-actions .btn-accept {
      background: var(--blue);
      color: #fff;
      border: 1px solid var(--blue);
      padding: 9px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 150ms ease;
    }
    .qa-three-actions .btn-accept:hover {
      background: #2545b8;
      box-shadow: 0 4px 14px rgba(49,87,213,0.3);
    }
    .qa-three-actions .btn-force-pass {
      background: #fff;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 9px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 150ms ease;
    }
    .qa-three-actions .btn-force-pass:hover {
      border-color: var(--amber);
      color: var(--amber);
      background: var(--amber-soft);
    }
    .qa-three-actions-input-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .qa-three-actions-input-wrap input {
      flex: 1;
      min-width: 0;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 13px;
      background: #fbfcff;
      color: var(--ink);
      outline: none;
    }
    .qa-three-actions-input-wrap input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(49,87,213,0.1);
    }
    .qa-three-actions-input-wrap input::placeholder {
      color: var(--muted);
    }
    .qa-three-actions-input-wrap .btn-submit-feedback {
      background: var(--green);
      color: #fff;
      border: 1px solid var(--green);
      padding: 9px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 150ms ease;
    }
    .qa-three-actions-input-wrap .btn-submit-feedback:hover {
      background: #0f6b47;
    }
    @media (max-width: 960px) {
      .qa-three-actions {
        grid-template-columns: 1fr;
      }
    }

    /* v12: QA Issue Card with violated_rule */
    .qa-issue-card .qa-violated-rule {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 800;
      background: var(--red-soft);
      color: var(--red);
      border: 1px solid rgba(196,61,94,0.2);
    }
    .qa-issue-card .qa-violated-rule.warning-rule {
      background: var(--amber-soft);
      color: var(--amber);
      border-color: rgba(180,107,8,0.2);
    }

    /* v12: Rules Drawer (已通过规则抽屉) */
    .rules-drawer-rule {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcff;
      align-items: start;
    }
    .rules-drawer-rule .rule-status-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 900;
      flex-shrink: 0;
    }
    .rules-drawer-rule .rule-status-icon.pass {
      background: var(--green-soft);
      color: var(--green);
    }
    .rules-drawer-rule .rule-status-icon.fail {
      background: var(--red-soft);
      color: var(--red);
    }
    .rules-drawer-rule .rule-body .rule-name {
      font-size: 14px;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .rules-drawer-rule .rule-body .rule-reason {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .workspace-status,
      .form-grid,
      .task-summary,
      .metric-grid,
      .content-grid,
      .orchestrator-strip,
      .contract-grid {
        grid-template-columns: 1fr;
        min-width: 0;
      }

      .agent-list {
        grid-template-columns: 1fr;
      }

      .matrix {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }

      .heatmap {
        grid-template-columns: 90px repeat(5, minmax(66px, 1fr));
        overflow-x: auto;
      }

      .bar-row {
        grid-template-columns: 82px minmax(0, 1fr) 38px;
      }
    }

    /* ========= 任务规划 Agent 表单样式 ========= */
    /* 任务编辑面板 */
    .task-edit-panel {
      background: #fff;
      border: 1px solid rgba(49, 87, 213, 0.18);
      border-radius: 12px;
      padding: 18px 20px;
      margin-top: 12px;
      animation: formSlideIn 250ms ease-out;
    }
    .task-edit-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .task-edit-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px 16px;
    }
    .task-edit-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .task-edit-field label {
      font-size: 11.5px;
      font-weight: 700;
      color: #475467;
    }
    .task-edit-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      background: #fff;
      transition: border-color 200ms ease, box-shadow 200ms ease;
      box-sizing: border-box;
    }
    .task-edit-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(49, 87, 213, 0.12);
    }
    .task-edit-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      min-height: 60px;
      box-sizing: border-box;
      transition: border-color 200ms ease;
    }
    .task-edit-textarea:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(49, 87, 213, 0.12);
    }
    .task-summary-textarea {
      width: 100%;
      min-height: 80px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13.5px;
      line-height: 1.65;
      resize: vertical;
      box-sizing: border-box;
      transition: border-color 200ms ease;
    }
    .task-summary-textarea:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(49, 87, 213, 0.12);
    }

    /* 内联添加表单面板（竞品/维度共用） */
    .inline-add-form {
      margin-top: 14px;
      padding: 18px 20px;
      background: linear-gradient(135deg, #f6f9ff 0%, #fff 100%);
      border: 1px solid rgba(49, 87, 213, 0.18);
      border-radius: 12px;
      animation: formSlideIn 250ms ease-out;
    }
    @keyframes formSlideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .inline-form-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .inline-form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px 16px;
    }
    .inline-form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .inline-form-field label {
      font-size: 11.5px;
      font-weight: 700;
      color: #475467;
    }
    .inline-form-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--ink);
      background: #fff;
      transition: border-color 200ms ease, box-shadow 200ms ease;
      box-sizing: border-box;
    }
    .inline-form-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(49, 87, 213, 0.12);
    }
    .inline-form-radio-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 4px;
    }
    .inline-form-radio {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--line);
      background: #fff;
      transition: all 200ms ease;
      user-select: none;
      position: relative;
    }
    /* 隐藏原生 radio，用 ::before 绘制自定义指示器 */
    .inline-form-radio input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }
    /* 自定义圆形指示器 */
    .inline-form-radio::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      transition: all 200ms ease;
      flex-shrink: 0;
      display: inline-block;
    }
    .inline-form-radio.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }
    .inline-form-radio.active::before {
      background: var(--blue);
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(49, 87, 213, 0.15);
    }
    .inline-form-radio:hover:not(.active) {
      border-color: #b4c0d8;
      background: #fafbff;
    }
    /* 竞品添加模式切换 Tab */
    .competitor-mode-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .comp-mode-tab {
      flex: 1;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      background: #fafbff;
      color: var(--muted);
      cursor: pointer;
      transition: all 200ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .comp-mode-tab.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 2px 8px rgba(49, 87, 213, 0.25);
    }
    .comp-mode-tab:hover:not(.active) {
      background: #f0f2fa;
      color: var(--text);
    }
    .inline-form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .inline-form-error {
      font-size: 12px;
      color: var(--red);
      font-weight: 700;
      margin-top: 8px;
      min-height: 18px;
    }

    const agents = [

    // ════════════════════════════════════════════════════════
    //  Data Loading Infrastructure — 跨 Part 数据互通
    // ════════════════════════════════════════════════════════
    const API_BASE = window.location.origin;
    window.loadedData = {};

    function getRunId() {
      var m = window.location.pathname.match(/\/runs\/([^/]+)/);
      var s = document.getElementById("runStatus");
      return m ? m[1] : (s && s.dataset.runId) || null;
    }

    async function fetchJSON(url) {
      try {
        var res = await fetch(url);
        return res.ok ? await res.json() : null;
      } catch (e) { return null; }
    }

    async function fetchAgentData(agentId) {
      var runId = getRunId();
      if (!runId) return null;
      var data = await fetchJSON(API_BASE + "/api/runs/" + runId + "/agent/" + agentId);
      return data && data.data ? data.data : null;
    }

    // 缩短竞品名用于显示
    function shortName(full) {
      var map = { "美的": "美的", "九阳": "九阳", "苏泊尔": "苏泊尔", "小熊": "小熊", "我方": "我方" };
      for (var k in map) { if (full.indexOf(k) >= 0) return map[k]; }
      return full;
    }

    // ── Transform: collected_sources.json → Part 3 comparisonScales ──
    function buildCompareTablesFromCollected(data) {
      if (!data || !data.competitors) return null;
      var names = data.competitors.map(function(c) { return shortName(c.name); });
      var ours = names.length >= 5 ? "我方" : "我方产品（规划）";

      function row(label, getVal) {
        var r = { metric: label };
        data.competitors.forEach(function(c, i) { r[names[i]] = getVal(c); });
        r[ours] = "-";
        return r;
      }

      return {
        coreData: {
          title: "核心数据对比",
          rows: [
            row("来源覆盖分", function(c) { return String(c.source_coverage_score || 0); }),
            row("信息缺口数", function(c) { return String((c.missing_information || []).length); }),
            row("可信度", function(c) { return c.source_packets && c.source_packets[0] ? c.source_packets[0].credibility : "中"; }),
          ]
        },
        userOps: {
          title: "用户运营对比",

    // ── Transform: structured_schema_table.json → Part 4 scoring/feature data ──
    function buildScoringFromStructured(data) {
      if (!data || !data.schema_table || data.schema_table.length === 0) return null;
      var table = data.schema_table;

      // 评分排名（根据结构化字段智能赋分）
      var rankings = table.map(function(row) {
        var hasWindow = row.window && row.window.indexOf("明确") >= 0 ? 1 : 0;
        var hasCleaning = row.cleaning_design && row.cleaning_design.indexOf("易清洁") >= 0 ? 1 : 0;
        var cap = parseFloat(row.capacity) || 5;
        var pow = parseFloat(row.power) || 1500;
        var missing = (row.missing_fields || []).length;

        var marketShare = Math.min(18, Math.round(cap * 3 + hasWindow * 3));
        var salesHeat = Math.min(18, Math.round(pow / 100 + hasCleaning * 4));
        var homogeneity = Math.min(18, Math.round(18 - missing));
        var exclusiveTech = Math.min(18, Math.round(hasWindow * 6 + hasCleaning * 4 + 6));
        var profitRate = Math.min(18, Math.round(18 - missing * 1.5));

        return {
          name: row.competitor_name,
          marketShare: marketShare,
          salesHeat: salesHeat,
          homogeneity: homogeneity,
          exclusiveTech: exclusiveTech,
          profitRate: profitRate,
          total: Math.min(100, marketShare + salesHeat + homogeneity + exclusiveTech + profitRate),
          rank: 0,
          recommend: ""
        };
      });

      // 我方产品
      rankings.push({
        name: "我方产品（规划）",
        marketShare: 4, salesHeat: 20, homogeneity: 18, exclusiveTech: 18, profitRate: 17, total: 77, rank: 0, recommend: "建议进入"
      });

      return rankings;
    }

    function buildBasicInfoFromStructured(data) {
      if (!data || !data.schema_table) return null;
      return data.schema_table.map(function(row) {
        return {
          name: row.competitor_name,
          price: row.pricing_model || "待确认",
          coreInfo: (row.capacity || "") + " | " + (row.power || "") + " | 热风循环",
          sellingPoints: (row.core_features || []).join("、"),
          goodReviews: (row.user_feedback || []).join("、"),
          badReviews: row.weaknesses || "待确认",
          dataSource: (row.source_links || []).join("、")
        };
      });
    }

    function buildFeaturesFromStructured(data) {
      if (!data || !data.schema_table) return null;
      var table = data.schema_table;
      var names = table.map(function(r) { return shortName(r.competitor_name); });

      function feat(name, desc, getScore, getParam) {
        var obj = { name: name, desc: desc };
        table.forEach(function(row, i) {
          obj[names[i].toLowerCase()] = { score: getScore(row), param: getParam(row) };
        });
        obj.ours = { score: 8, param: "规划中" };
        return obj;
      }

      return {
        features: [
          feat("加热均匀性", "热风循环效果",
            function(r) { return Math.min(10, Math.round((parseFloat(r.power) || 1400) / 200)); },
            function(r) { return (r.power || "1500W") + "+热风"; }),
          feat("可视窗", "烹饪过程可视",
            function(r) { return r.window && r.window.indexOf("明确") >= 0 ? 9 : r.window && r.window.indexOf("确认") >= 0 ? 5 : 4; },
            function(r) { return r.window || "无"; }),
          feat("易清洁性", "炸篮清洁难度",
            function(r) { return r.cleaning_design && r.cleaning_design.indexOf("易清洁") >= 0 ? 7 : 5; },
            function(r) { return r.cleaning_design || "标准"; }),
        ]
      };
    }

    function buildBcgFromStructured(data) {
      if (!data || !data.schema_table) return null;
      var table = data.schema_table;
      var products = table.map(function(row, i) {
        var x = 30 + i * 12;
        var y = 30 + i * 12;
        var colors = ["#3157d5", "#0f91b8", "#b46b08", "#7b4ce3"];
        return { name: shortName(row.competitor_name), x: x, y: y, color: colors[i % 4], quadrant: "明星" };
      });
      products.push({ name: "我方", x: 75, y: 80, color: "#16845b", quadrant: "明星" });
      return { products: products, xLabel: "市场增长率 ↑", yLabel: "市场占有率 ←" };
    }

    function buildSwotFromStructured(data) {
      if (!data || !data.schema_table) return null;
      return data.schema_table.map(function(row) {
        var missing = (row.missing_fields || []).length;
        var hasWindow = row.window && row.window.indexOf("明确") >= 0 ? 1 : 0;
        return {
          product: shortName(row.competitor_name),
          S: { score: 5 + hasWindow * 3, comment: (row.core_features || []).slice(0, 2).join("、") },
          W: { score: 3 + missing, comment: (row.weaknesses || "").substring(0, 15) },
          O: { score: 6, comment: "市场增长机会" },
          T: { score: 6, comment: "同质化竞争" }
        };
      });
    }

    // ── Transform: comparison_analysis.json → Part 4 opportunity/evidence data ──
    function buildOppsFromComparison(data) {
      if (!data || !data.opportunity_points) return null;
      return data.opportunity_points.map(function(op) {
        return {
          feature: op.opportunity,
          description: op.logic || op.pain_point || "",
          evidence: op.evidence || [],
          priority: op.priority || "P2",
          difficulty: op.difficulty || "medium",
          confidence: op.evidence_confidence || "medium"
        };
      });
    }

    function buildEvidenceFromComparison(data) {
      if (!data || !data.evidence_chains) return null;
      return data.evidence_chains.map(function(ec) {
        return {
          id: ec.claim_id,
          claim: ec.claim,
          sourceIds: ec.source_ids || [],
          confidence: ec.confidence || "中",
          risk: ec.risk_boundary || ""
        };
      });
    }

            allIssues.push({ stageId: stageId, stageName: result.stageName, issue: issue, qaStatus: result.qaStatus });
          });
        }
      });
      if (!allIssues.length) {
        return '<div class="qa-empty"><h3>未发现问题</h3><p>所有阶段质检规则均已通过。</p></div>';
      }
      return allIssues.map(function(item, idx) {
        var issue = item.issue;
        var levelCls = issue.issueLevel === "blocker" ? "blocker" : "warning";
        var levelLabel = issue.issueLevel === "blocker" ? "需修复" : "警告";
        var levelColor = issue.issueLevel === "blocker" ? "var(--red)" : "var(--amber)";
        var agentLabel = { planning: "任务规划 Agent", collecting: "信息采集 Agent", structuring: "结构化处理 Agent", comparing: "对比分析 Agent", writing: "报告撰写 Agent" }[issue.rollbackTarget] || issue.rollbackTarget;
        var actionId = "qa_action_" + item.stageId + "_" + idx;
        var violatedTag = issue.violatedRule
          ? '<span class="qa-violated-rule' + (issue.issueLevel === "warning" ? " warning-rule" : "") + '">违反规则：' + escapeHtml(issue.violatedRule) + '</span>'
          : '';
        var primaryLabel = item.stageId === "structuring" && issue.issueLevel === "blocker"
          ? "查看并选择处理方案"
          : "采纳 AI 修复并重跑";
        return '<div class="qa-issue-card ' + levelCls + '" id="' + actionId + '">'
          + '<div class="qa-issue-meta">'
          + '<b style="color:' + levelColor + '">' + levelLabel + '</b>'
          + '<b>阶段</b> ' + item.stageName
          + '<b>退回目标</b> ' + agentLabel
          + violatedTag
          + '</div>'
          + '<div style="font-size:14px;line-height:1.6;margin:8px 0"><b>' + (item.isStructuringRoot ? "苏泊尔 KD60D830 价格与套餐口径冲突：</b>" : "诊断：</b>") + escapeHtml(issue.issueDesc) + '</div>'
          + (issue.fixPrompt ? '<div class="qa-fix-prompt" style="margin-bottom:4px">' + escapeHtml(issue.fixPrompt) + '</div>' : '')
          + '<div class="qa-three-actions">'
          + (item.isStructuringRoot
            ? '<button class="btn-accept" type="button" data-workflow-action="reviewStructuringResolution">' + primaryLabel + '</button>'
            : '<button class="btn-accept" type="button" data-qa-accept="' + actionId + '">' + primaryLabel + '</button>')
          + (issue.issueLevel === "warning" ? '<button class="btn-force-pass" type="button" data-qa-force-pass="' + actionId + '">带风险继续</button>' : '')
          + (!item.isStructuringRoot ? '<div class="qa-three-actions-input-wrap">'
          + '<input type="text" placeholder="输入自定义修改要求..." data-qa-feedback-input="' + actionId + '" />'
          + '<button class="btn-submit-feedback" type="button" data-qa-submit-feedback="' + actionId + '">提交并重跑</button>'
          + '</div>' : '')
          + '</div>'
          + '</div>';
      }).join("");
    }

    function renderQAPassedList() {
      var passedRules = getAllCheckedRules().filter(function(r) { return r.status === "PASS"; });
      if (!passedRules.length) {
        return '<p class="muted" style="padding:16px 0">暂无已通过规则。</p>';

        + '✓ 查看已通过的 ' + passedRules.length + ' 项检查规则 '
        + '<span style="font-size:11px">▶</span>'
        + '</button>'
        + '<span style="font-size:12px;color:var(--muted)">' + preview + '</span>';

    function renderQADashboard() {
      var overview = document.getElementById("qaOverview");
      var timeline = document.getElementById("qaTimeline");
      var issueList = document.getElementById("qaIssueList");
      var passedList = document.getElementById("qaPassedList");
      var passedSection = document.getElementById("qaPassedSection");

          ? "校验全部通过，未发现规则违规或证据缺口。"
          : gate.overallStatus === "WARNING"
          ? "校验通过（带警告），" + getAllCheckedRules().filter(function(r) { return r.status === "FAIL"; }).length + " 项规则未通过，已标记为警告。"
          : "校验未通过，" + gate.blocked + " 个阶段存在需修复的硬伤。";

    function openQARulesDrawer(filter) {
      var qa = getCurrentQA();
      var rules = qa.checked_rules || [];
      // QA 仪表盘页面使用全部阶段的规则
      if (runtime.page === 'qa-dashboard' || rules.length === 0) {
        rules = getAllCheckedRules().map(function(r) {
          return { rule_name: r.ruleName || '', status: r.status || 'PASS', reason: r.reason || '' };
        });
      }
      var displayRules = rules;
      if (filter === "passed") displayRules = rules.filter(function(r) { return r.status === "PASS"; });
      else if (filter === "failed") displayRules = rules.filter(function(r) { return r.status === "FAIL"; });

      var allCount = rules.length;
      var passedCount = rules.filter(function(r){return r.status==="PASS"}).length;
      var failedCount = rules.filter(function(r){return r.status==="FAIL"}).length;

      var tabs = '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'
        + '<button class="btn" type="button" onclick="openQARulesDrawer()" style="font-size:12px">全部（' + allCount + '）</button>'
        + '<button class="btn" type="button" onclick="openQARulesDrawer(\'passed\')" style="font-size:12px;color:var(--green)">通过（' + passedCount + '）</button>'
        + '<button class="btn" type="button" onclick="openQARulesDrawer(\'failed\')" style="font-size:12px;color:var(--red)">异常（' + failedCount + '）</button>'
        + '</div>';

      var rulesHtml = displayRules.map(function(r) {
        var icon = r.status === "PASS" ? "\u2713" : "\u2717";
        var color = r.status === "PASS" ? "var(--green)" : "var(--red)";
        var bg = r.status === "PASS" ? "var(--green-soft)" : "var(--red-soft)";
        return '<div class="qa-rules-drawer-item ' + (r.status === "PASS" ? "passed" : "failed") + '">'
          + '<h3 style="display:flex;align-items:center;gap:6px;font-size:14px;margin:0 0 6px">'
          + '<span style="color:' + color + ';font-weight:900">' + icon + '</span> '
          + escapeHtml(r.rule_name) + '</h3>'
          + '<p style="font-size:13px;color:#475467;line-height:1.6;margin:0">'
          + escapeHtml(r.reason) + '</p>'
          + '</div>';
      }).join("");

      if (!rulesHtml) rulesHtml = '<p style="color:var(--muted);text-align:center;padding:20px">当前筛选条件下无规则记录。</p>';

      openDrawer(
        "规则校验明细",
        "质检 Agent 对当前阶段产出校验了 " + allCount + " 项规则，逐条展示通过/失败原因。",
        tabs + rulesHtml,
        { view: "qa-rules", filter: filter || "all" }
      );
    }

    function handleQAAccept(actionId) {
      if (actionId.indexOf("qa_action_structuring_") === 0) {
        runtime.page = "home";
        runtime.viewStage = "execution";
        runtime.viewAgent = "structuring";

      }

    function handleQAForcePass(actionId) {
      runtime.messages.push("已选择带风险继续。该问题将记录在风险披露章节。");
      runtime.qualityText = "仅带风险标记放行";
      showToast("已选择带风险继续。该问题将记录在风险披露章节。");

    function handleQASubmitFeedback(actionId, feedbackText) {

        showToast("请输入自定义修改要求。");

        + "background:#182033;color:#fff;padding:10px 24px;border-radius:999px;font-size:13px;font-weight:600;"
        + "box-shadow:0 8px 24px rgba(0,0,0,0.2);animation:rise 220ms ease both;";

      setTimeout(function() { toast.remove(); }, 3000);

    function openQAStageDetail(stageId) {

          + rules.map(function(r) {

        '<section class="drawer-section">'

          + '<p>评分：' + result.score + ' | ' + passCount + '/' + rules.length + ' 规则通过 | ' + (result.issues ? result.issues.length : 0) + ' 问题</p>'
          + '<p style="font-size:12px;color:var(--muted)">' + escapeHtml(result.qaSummary || "") + '</p>'
