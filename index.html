    // Hook: 在 stage 切换时联动更新 QA 演示数据
    function syncQADataToStage(newStage) {
      if (newStage === "input") return;
      if (newStage === "plan") {
        // planning QA 已经通过
      }
      if (newStage === "collecting") {
        // collecting QA 可能产生 warning
        var cs = evaluateCollectingState();
        if (cs === "BLOCKED_MANUAL_INTERVENTION") {
          stageQAResults.collecting.qaStatus = "BLOCK";
          stageQAResults.collecting.score = 45;
        } else if (cs === "SUCCESS_CONFIRMED") {
          stageQAResults.collecting.qaStatus = "PASS";
          stageQAResults.collecting.score = 84;
        }
      }
      if (newStage === "execution") {
        if (workflowState.skuConflictFixed) {
          resolveStructuringQA();
        }
      }
      if (newStage === "compare") {
        if (workflowState.reviewEvidenceFixed) {
          stageQAResults.comparing.qaStatus = "PASS";
          stageQAResults.comparing.score = 84;
          stageQAResults.comparing.issues = stageQAResults.comparing.issues.filter(function(i) { return i.issueDesc.indexOf("QZG") < 0; });
        }
      }
    }

    function resolveStructuringQA() {
      var result = stageQAResults.structuring;
      var blockerResolved = isStructuringRuleResolved("priceConsistency");
      var ignoredWarnings = hasIgnoredStructuringWarnings();
      var remainingWarningIssues = [];

      result.checkedRules = JSON.parse(JSON.stringify(initialStructuringQA.checkedRules)).map(function(rule) {
        var resolutionRule = structuringResolutionRules.find(function(item) { return item.ruleName === rule.ruleName; });
        if (!resolutionRule) return rule;
        var state = structuringResolutionState[resolutionRule.key];
        var resolved = isStructuringRuleResolved(resolutionRule.key);
        var ignored = state.decision === "ignore";
        if (resolved) {
          return { ruleName: rule.ruleName, status: "PASS", reason: structuringResolutionReason(resolutionRule) };
        }
        if (ignored && resolutionRule.level === "Warning") {
          remainingWarningIssues.push({
            violatedRule: resolutionRule.ruleName,
            issueLevel: "warning",
            issueDesc: resolutionRule.issueDesc,
            rollbackTarget: "structuring",
            fixPrompt: "用户选择保留风险。后续报告将披露该字段不能用于强比较。"
          });
          return { ruleName: rule.ruleName, status: "FAIL", reason: structuringResolutionReason(resolutionRule) };
        }
        return rule;
      });

      if (!blockerResolved) {
        result.qaStatus = "BLOCK";
        result.score = 45;
        result.qaSummary = structuringResolutionState.priceConsistency.decision === "ignore"
          ? "价格口径一致性仍未处理，结构化阶段继续阻断，不能进入对比分析。"
          : "价格口径一致性尚未确认，结构化阶段需要先完成规则级处理。";
        result.issues = JSON.parse(JSON.stringify(initialStructuringQA.issues));
        return;
      }

      result.qaStatus = ignoredWarnings ? "WARNING" : "PASS";
      result.score = ignoredWarnings ? 80 : 86;
      result.qaSummary = ignoredWarnings
        ? "结构化质检带风险通过。价格口径已处理；未处理的 Warning 已进入风险披露。"
        : "结构化质检通过。价格与套餐口径已按所选方案拆分，结构化结果可进入下一阶段。";
      result.issues = remainingWarningIssues;
    }

    // === 内嵌 QA 结果面板（渲染在当前阶段页面最下方） ===
    function getCurrentStageId() {
      var agentId = runtime.activeAgent;
      var mapping = { planning: "planning", collecting: "collecting", structuring: "structuring", comparing: "comparing", writing: "writing" };
      return mapping[agentId] || "writing";
    }

    function getCurrentQA() {
      var stageId = getCurrentStageId();
      var data = stageQAResults[stageId];
      if (!data) return { stage_qa_status: "PASS", qa_summary: "尚未执行质检。", issues: [], checked_rules: [] };
      if (runtime.stage === "input") {
        return { stage_qa_status: "PASS", qa_summary: "任务尚未提交，质检将在 Agent 执行后自动触发。", issues: [], checked_rules: [], checkedAt: "" };
      }
      var passCount = (data.checkedRules || []).filter(function(r) { return r.status === "PASS"; }).length;
      var totalCount = (data.checkedRules || []).length;
      return {
        stage_qa_status: data.qaStatus,
        qa_summary: _generateInlineQASummary(data),
        issues: (data.issues || []).map(function(i) { return {
          violated_rule: i.violatedRule || "",
          issue_level: i.issueLevel,
          issue_desc: i.issueDesc,
          rollback_target: i.rollbackTarget,
          fix_prompt: i.fixPrompt
        }; }),
        checked_rules: (data.checkedRules || []).map(function(r) { return {
          rule_name: r.ruleName || "",
          status: r.status || "PASS",
          reason: r.reason || ""
        }; }),
        passed_count: passCount,
        total_rules: totalCount,
        checked_at: data.checkedAt,
        stage_name: data.stageName
      };
    }

    function _generateInlineQASummary(data) {
      var s = data.qaStatus;
      var n = String(data.stageName || "").replace(/质检$/, "");
      var passCount = (data.checkedRules || []).filter(function(r) { return r.status === "PASS"; }).length;
      var totalRules = (data.checkedRules || []).length;
      var failCount = totalRules - passCount;
      var is = data.issues ? data.issues.length : 0;
      var blockerCount = (data.issues || []).filter(function(i) { return i.issueLevel === "blocker"; }).length;
      if (s === "PASS") return n + "质检通过。已完成 " + totalRules + " 项规则校验，未发现异常。";
      if (s === "WARNING") return n + "质检不通过，校验 " + totalRules + " 项规则，" + passCount + " 项通过。发现 " + failCount + " 处异常，存在 " + is + " 项警告。";
      return n + "质检不通过，校验 " + totalRules + " 项规则，" + passCount + " 项通过。发现 " + failCount + " 处异常，存在 " + blockerCount + " 处阻断问题需修复后方可进入下一阶段。";
    }

    function renderStructuringResolutionRule(rule) {
      var state = structuringResolutionState[rule.key];
      var isBlocker = rule.level === "Blocker";
      var ignoreLabel = isBlocker ? "暂不处理，保留阻断" : "忽略并保留风险";
      var customInput = state.decision === "custom"
        ? '<input id="structuringCustom_' + rule.key + '" type="text" value="' + escapeHtml(state.customText) + '" placeholder="请输入本规则的自定义处理方案" style="margin-top:8px">'
        : "";
      return '<div style="margin-top:10px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fbfcff">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">'
        + '<b style="font-size:13px">' + escapeHtml(rule.ruleName) + '</b>'
        + '<span class="qa-violated-rule' + (isBlocker ? '' : ' warning-rule') + '">' + rule.level + '</span>'
        + '</div>'
        + '<p style="margin:8px 0 0;font-size:12px;line-height:1.55"><b>问题：</b>' + escapeHtml(rule.issueDesc) + '</p>'
        + '<p style="margin:6px 0 0;font-size:12px;line-height:1.55"><b>AI 建议：</b>' + escapeHtml(rule.aiSuggestion) + '</p>'
        + '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--ink)">'
        + '<label style="font-weight:600"><input style="width:auto;padding:0;margin:0 4px 0 0;vertical-align:middle" type="radio" name="structuring_' + rule.key + '" value="accept_ai" data-structuring-decision="' + rule.key + '"' + (state.decision === "accept_ai" ? " checked" : "") + '> 采纳 AI 建议</label>'
        + '<label style="font-weight:600"><input style="width:auto;padding:0;margin:0 4px 0 0;vertical-align:middle" type="radio" name="structuring_' + rule.key + '" value="ignore" data-structuring-decision="' + rule.key + '"' + (state.decision === "ignore" ? " checked" : "") + '> ' + ignoreLabel + '</label>'
        + '<label style="font-weight:600"><input style="width:auto;padding:0;margin:0 4px 0 0;vertical-align:middle" type="radio" name="structuring_' + rule.key + '" value="custom" data-structuring-decision="' + rule.key + '"' + (state.decision === "custom" ? " checked" : "") + '> 使用自定义方案</label>'
        + '</div>'
        + customInput
        + '</div>';
    }

    function renderStructuringResolutionResult() {
      return '<div class="risk-card ' + (stageQAResults.structuring.qaStatus === "WARNING" ? "amber" : "green") + '" style="margin-bottom:16px">'
        + '<b>' + (stageQAResults.structuring.qaStatus === "WARNING" ? "已完成 Demo 模拟重跑，结构化结果带风险通过" : "已完成 Demo 模拟重跑，结构化结果已通过") + '</b>'
        + '<ul style="margin:8px 0 0;padding-left:18px">'
        + structuringResolutionRules.map(function(rule) {
          var state = structuringResolutionState[rule.key];
          var label = state.decision === "accept_ai" ? "已按 AI 建议处理"
            : state.decision === "custom" ? "已按用户方案处理"
            : "未处理，已保留风险";
          return '<li>' + escapeHtml(rule.ruleName) + "：" + escapeHtml(label) + '</li>';
        }).join("")
        + '<li>已生成版本 ' + escapeHtml(runtime.version || "V2") + '</li>'
        + '</ul>'
        + '</div>';
    }

    function applyStructuringResolution() {
      structuringResolutionRules.forEach(function(rule) {
        var input = document.getElementById("structuringCustom_" + rule.key);
        if (input) structuringResolutionState[rule.key].customText = input.value.trim();
      });
      var incomplete = structuringResolutionRules.find(function(rule) {
        var state = structuringResolutionState[rule.key];
        return !state.decision || (state.decision === "custom" && !state.customText.trim());
      });
      if (incomplete) {
        showToast(structuringResolutionState[incomplete.key].decision === "custom" ? "请填写“" + incomplete.ruleName + "”的自定义方案。" : "请先为三条规则分别选择处理方式。");
        return;
      }
      if (structuringResolutionState.priceConsistency.decision === "ignore") {
        workflowState.skuConflictFixed = false;

        collecting: { stage: "collecting", status: runtime.stage === "input" || runtime.stage === "plan" ? "pending" : (() => { const cs = evaluateCollectingState(); return cs === 'SUCCESS_CONFIRMED' ? "pass" : cs === 'BLOCKED_MANUAL_INTERVENTION' ? "blocked" : "checking"; })(), label: runtime.stage === "input" || runtime.stage === "plan" ? "尚未执行" : (() => { const cs = evaluateCollectingState(); return cs === 'SUCCESS_CONFIRMED' ? "QA 已通过" : cs === 'BLOCKED_MANUAL_INTERVENTION' ? "QA 阻断" : "采集执行中"; })(), issueIds: evaluateCollectingState() === 'BLOCKED_MANUAL_INTERVENTION' ? ["QI-SKU-001"] : [], checkedAt: "采集完成后自动验收" },
        structuring: { stage: "structuring", status: runtime.stage === "input" || runtime.stage === "plan" || runtime.stage === "collecting" ? "pending" : (structuringStatus === "PASS" ? "pass" : structuringStatus === "WARNING" ? "warning" : "blocked"), label: runtime.stage === "input" || runtime.stage === "plan" || runtime.stage === "collecting" ? "等待验收" : structuringLabel, issueIds: structuringStatus === "PASS" ? [] : ["QI-SKU-001"], checkedAt: "结构化输出后自动验收" },
        comparing: { stage: "comparing", status: runtime.stage === "input" || runtime.stage === "plan" || runtime.stage === "collecting" || runtime.stage === "execution" ? "pending" : (workflowState.reviewEvidenceFixed ? "pass" : "warning"), label: runtime.stage === "input" || runtime.stage === "plan" || runtime.stage === "collecting" || runtime.stage === "execution" ? "等待验收" : (workflowState.reviewEvidenceFixed ? "QA 已通过" : "1 项警告"), issueIds: workflowState.reviewEvidenceFixed ? ["QI-REF-003"] : ["QI-EVD-002", "QI-REF-003"], checkedAt: "对比分析后自动验收" },
        writing: { stage: "writing", status: runtime.stage === "report" ? "pass" : "pending", label: runtime.stage === "report" ? "交付检查通过" : "等待验收", issueIds: workflowState.reviewEvidenceFixed ? ["QI-REF-003"] : ["QI-EVD-002", "QI-REF-003"], checkedAt: runtime.stage === "report" ? "报告生成后自动验收" : "" }
      }[agentId] || { stage: agentId, status: "pending", label: "等待验收", issueIds: [], checkedAt: "" };
      return result;
    }

    function getFinalDeliveryGate() {
      const unresolvedBlockers = workflowState.skuConflictFixed ? 0 : 1;
      const structuringWarning = hasIgnoredStructuringWarnings() ? 1 : 0;
      const unresolvedWarnings = (workflowState.reviewEvidenceFixed ? 1 : 2) + structuringWarning;
      return {
        unresolvedBlockers,
        unresolvedWarnings,
        reportVersion: analysisTask.currentVersionId,
        dataSyncStatus: runtime.stage === "report" ? "已同步" : "待生成报告",
        canDeliver: runtime.stage === "report" && unresolvedBlockers === 0,
        warningIds: (hasIgnoredStructuringWarnings() ? ["QI-SKU-001"] : []).concat(workflowState.reviewEvidenceFixed ? ["QI-REF-003"] : ["QI-EVD-002", "QI-REF-003"])
      };
    }

    function getAgentStatus(agentId) {
      const order = ["planning", "collecting", "structuring", "comparing", "writing"];
      const activeIndex = order.indexOf(runtime.activeAgent);
      const idx = order.indexOf(agentId);
      const latestRun = [...agentRuns].reverse().find((run) => run.agentType === agentId);
      if (latestRun?.status === "running") return "执行中";
      if (latestRun?.status === "rerun") return "正在补充";
      if (runtime.stage === "input") return agentId === "planning" ? "待开始" : "等待中";
      if (runtime.stage === "plan") return agentId === "planning" ? "待确认" : "等待中";
      if (runtime.stage === "collecting") {
        if (agentId === "planning") return "已完成";
        if (agentId === "collecting") { const cs = evaluateCollectingState(); return cs === 'EXECUTING' ? "执行中" : cs === 'BLOCKED_MANUAL_INTERVENTION' ? "需处理" : "已完成"; }
        return "等待中";
      }
      if (runtime.stage === "execution") {
        if (workflowState.currentIssueId === "QI-SKU-001" && agentId === "structuring" && !workflowState.skuConflictFixed) return "需处理";
        if (workflowState.skuConflictFixed && agentId === "structuring") return stageQAResults.structuring.qaStatus === "WARNING" ? "带风险通过" : "已完成";
        if (agentId === runtime.activeAgent) return runtime.running ? "执行中" : "需处理";
        return idx < activeIndex ? "已完成" : "等待中";
      }
      if (runtime.stage === "compare") return idx <= 3 ? "已完成" : idx === 4 ? "等待撰写" : "等待中";
      if (runtime.stage === "report") return idx <= 4 ? "已完成" : "等待中";
      return "等待中";
    }

    function getAgentIssue(agentId) {
      if (runtime.stage === "plan" && agentId === "planning") return "待确认 SKU 范围";
      if (runtime.stage === "execution" && agentId === "structuring" && !workflowState.skuConflictFixed) return "规格/套餐冲突";
      if (workflowState.skuConflictFixed && agentId === "collecting") return hasIgnoredStructuringWarnings() ? "已补充规格，保留风险" : "已补充规格";
      if (runtime.stage === "compare" && agentId === "comparing") return "机会点需确认";
      return "无";
    }

    function agentLastEvent(agentId) {
      const run = [...agentRuns].reverse().find((item) => item.agentType === agentId);
      if (run?.outputSummary) return run.outputSummary;
      if (agentId === runtime.activeAgent) return workflowState.lastHandoff;
      return agents.find((agent) => agent.id === agentId)?.line || "";
    }

    function renderAgentFlow() {
      const host = document.getElementById("agentFlow");
      host.innerHTML = agents.map((agent) => {
        const status = getAgentStatus(agent.id);
        const issue = getAgentIssue(agent.id);
        const active = agent.id === runtime.viewAgent;
        const available = canViewAgent(agent.id);
        const compactStatus = issue !== "无" ? `${status} · 1 个问题` : status;
        return `
          <button class="agent-node compact ${active ? "active" : ""} ${available ? "" : "locked"}" type="button" data-agent-jump="${agent.id}" style="--accent:${agent.accent}">
            <span class="agent-num">${agent.number}</span>
            <h3>${agent.name}</h3>
            <span class="agent-meta"><span class="status-tag ${statusClass(status)}">${compactStatus}</span></span>
          </button>
        `;
      }).join("");
    }

    function attachmentSummary() {
      const parts = [];
      if (taskAttachments.links.length) parts.push(taskAttachments.links.length + " 个商品链接");
      if (taskAttachments.images.length) parts.push(taskAttachments.images.length + " 张截图");
      if (taskAttachments.files.length) parts.push(taskAttachments.files.length + " 个文件");
      return parts.join("、");
    }

    function formatAttachmentSize(size) {
      if (!Number.isFinite(size) || size < 1024) return Math.max(0, size || 0) + " B";
      if (size < 1024 * 1024) return (size / 1024).toFixed(1) + " KB";
      return (size / (1024 * 1024)).toFixed(1) + " MB";
    }

    function createAttachmentId(kind) {
      return kind + "-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 7);
    }

    function clearTaskAttachments() {
      taskAttachments.images.forEach(function(item) {
        if (item.previewUrl) URL.revokeObjectURL(item.previewUrl);
      });
      taskAttachments.links.splice(0);
      taskAttachments.images.splice(0);
      taskAttachments.files.splice(0);
    }

    function addSupplementLink() {
      const input = document.getElementById("supplementLink");
      const url = input ? input.value.trim() : "";
      try {
        const parsed = new URL(url);
        if (parsed.protocol !== "http:" && parsed.protocol !== "https:") throw new Error("Unsupported protocol");
      } catch (error) {
        showToast("请输入有效的商品链接（以 http:// 或 https:// 开头）。");
        return;
      }
      if (!taskAttachments.links.some(function(item) { return item.url === url; })) {
        taskAttachments.links.push({ id: createAttachmentId("link"), name: url, type: "链接", size: 0, url: url });
      }
      if (input) input.value = "";
      persistForm();
      renderAll();
    }

    function addAttachmentFiles(kind, files) {
      Array.from(files || []).forEach(function(file) {
        const item = {
          id: createAttachmentId(kind),
          name: file.name,
          type: file.type || (file.name.split(".").pop() || "文件").toUpperCase(),
          size: file.size,
          url: ""
        };
        if (kind === "images") item.previewUrl = URL.createObjectURL(file);
        taskAttachments[kind].push(item);
      });
      persistForm();
      renderAll();
    }

    function removeTaskAttachment(kind, id) {
      const items = taskAttachments[kind];
      const index = items.findIndex(function(item) { return item.id === id; });
      if (index < 0) return;
      const item = items[index];
      if (item.previewUrl) URL.revokeObjectURL(item.previewUrl);
      items.splice(index, 1);
      persistForm();
      renderAll();

      const statusLabel = (st) => st === 'completed' ? '已完成' : st === 'running' ? '执行中' : '等待中';

    function currentVersion() {
      return reportVersions.find((version) => version.versionId === analysisTask.currentVersionId) || reportVersions[reportVersions.length - 1];
    }

    function renderRunRecords() {
      return `
        <details style="margin-top:16px">
          <summary>查看运行记录</summary>
          <div class="context-list">
            ${agentRuns.slice(-6).map((run) => `
              <div class="run-record">
                <b>${run.runId}｜${agentName(run.agentType)}｜${run.status}</b>
                <span>输入：${run.inputSummary}</span>
                <span>输出：${run.outputSummary}</span>
                ${run.rerunReason ? `<span>重跑原因：${run.rerunReason}</span>` : ""}
                <span>影响范围：${run.affectedSections.join("、")}</span>
              </div>
            `).join("")}
          </div>
        </details>
      `;
    }

    function agentName(agentId) {
      return agents.find((agent) => agent.id === agentId)?.name || agentId;
    }

    function nextVersion(reason, changedSections, previousVersionId = analysisTask.currentVersionId) {
      reportVersions.forEach((version) => version.status = "archived");
      const versionNumber = reportVersions.length + 1;
      const version = {
        versionId: `V${versionNumber}`,
        versionNumber,
        createdAt: new Date().toLocaleString("zh-CN", { hour12: false }),
        changeReason: reason,
        changedSections,
        previousVersionId,
        status: "current",
        diffSummary: `${reason}；更新 ${changedSections.join("、")}。`
      };
      reportVersions.push(version);
      analysisTask.currentVersionId = version.versionId;
      analysisTask.updatedAt = version.createdAt;
      runtime.version = version.versionId;
      workflowState.selectedVersionId = version.versionId;
      return version;
    }

    function recordAgentRun(agentType, status, inputSummary, outputSummary, rerunReason, affectedSections) {
      const run = {
        runId: `AR-${String(agentRuns.length + 1).padStart(3, "0")}`,
        agentType,
        status,
        inputSummary,
        outputSummary,
        startedAt: new Date().toLocaleTimeString("zh-CN", { hour12: false }),
        completedAt: status === "running" ? "" : new Date().toLocaleTimeString("zh-CN", { hour12: false }),
        rerunReason,
        affectedSections
      };
      agentRuns.push(run);
      return run;
    }

    function applySkuConflictFix(autoAdvanceToCompare) {
      if (runtime.running && !autoAdvanceToCompare) {

    function qaIssueStatus(issue) {
      if (issue.issueId === "QI-SKU-001") return workflowState.skuConflictFixed ? "已解决" : "未解决";
      if (issue.issueId === "QI-EVD-002") return workflowState.reviewEvidenceFixed ? "已解决" : "未解决";
      return "保留披露";
    }

    function qaIssueActions(issue) {
      if (issue.issueId === "QI-SKU-001" && !workflowState.skuConflictFixed) {
        return `<button class="btn primary" type="button" data-workflow-action="reviewStructuringResolution">查看并选择处理方案</button>`;
      }
      if (issue.issueId === "QI-EVD-002" && !workflowState.reviewEvidenceFixed) {
        return `<button class="btn primary" type="button" data-workflow-action="fixReviewEvidence">补充评价证据</button>`;
      }
      return `<button class="btn" type="button" data-workflow-action="manualEditIssue">手动修改</button>`;
    }

    function renderQAIssueCard(issue) {
      const severityLabel = issue.severity === "blocked" ? "BLOCKED｜阻断" : "WARNING｜带警告通过";
      return `
        <section class="drawer-section">
          <h3>${severityLabel}：${issue.title}</h3>
          <p><b>当前状态：</b>${qaIssueStatus(issue)}</p>
          <p><b>问题说明：</b>${issue.description}</p>
          <p><b>为什么影响结果：</b>${issue.impact}</p>
          <p><b>责任 Agent：</b>${agentName(issue.ownerAgent)}</p>
          <p><b>建议动作：</b>${issue.action}</p>
          <p><b>影响范围：</b>${issue.affectedSections.join("、")}</p>
          <p><b>重跑范围：</b>${issue.rerunScope.join("、")}</p>
          <div class="button-row">
            ${issue.evidenceIds.map((id) => `<button class="btn" type="button" data-evidence="${id}">查看证据</button>`).join("")}
            ${qaIssueActions(issue)}
            <button class="btn" type="button" data-workflow-action="ignoreIssue">忽略并记录原因</button>
          </div>
        </section>
      `;
    }

    function openQADrawer(issueId = "", stage = "") {
      const gate = getFinalDeliveryGate();
      const stageQA = stage ? getStageQA(stage) : null;
      let issues = issueId ? [getQualityIssue(issueId)].filter(Boolean) : [...qualityIssues.blockers, ...qualityIssues.warnings];
      if (stageQA?.issueIds?.length) {
        issues = stageQA.issueIds.map(getQualityIssue).filter(Boolean);
      }
      if (!issues.length) {
        issues = gate.warningIds.map(getQualityIssue).filter(Boolean);
      }
      openDrawer("QA Guardrail 详情", "统一质量验收机制：默认自动运行，只在警告或阻断时提示。", `
        <section class="drawer-section">
          <h3>最终交付 Gate</h3>
          <p>阻断问题：${gate.unresolvedBlockers}；未解决警告：${gate.unresolvedWarnings}；当前版本：${gate.reportVersion}；数据状态：${gate.dataSyncStatus}。</p>
        </section>
        ${stage ? `<section class="drawer-section"><h3>阶段 QA 规则</h3><ol>${(qaRules[stage] || []).map((item) => `<li>${item}</li>`).join("")}</ol><p>验收结果：${stageQA.label}。</p></section>` : ""}
        ${issues.map(renderQAIssueCard).join("")}
        <section class="drawer-section">
          <h3>已通过摘要</h3>
          <p>${qualityIssues.passed.length} 项已通过，不逐条展开。${qualityIssues.passed.join("；")}。</p>
        </section>
      `, { view: "qa", issueId, stage });
    }

    function renderFinalPage() {
      const final = document.getElementById("final");
      const _sr = useData('scoringRanking', scoringRanking);
      const _opps = sortOpportunitiesByPriority(useData('differentiationOpportunities', differentiationOpportunities));
      const _evidences = useData('evidenceChains', evidenceChains);
      const _basicInfo = useData('productBasicInfo', productBasicInfo);
      const _cs = useData('compareTables', comparisonScales);
      const _features = useData('featureComparison', featureComparison);
      const _bcg = useData('bcgMatrix', bcgMatrix);
      const _swot = useData('swotAnalysis', swotAnalysis);

      // ---- 从前置 Agent 输出数据计算决策摘要 ----
      const ourScore = _sr.find(function(s) { return s.name.indexOf("我方") >= 0; });
      const decisionScore = ourScore ? ourScore.total : 84;
      const decisionLevel = decisionScore >= 80 ? "强烈建议进入" : decisionScore >= 65 ? "可以进入" : decisionScore >= 50 ? "谨慎进入" : "不建议";
      const decisionColor = decisionScore >= 80 ? "#16845b" : decisionScore >= 65 ? "#3157d5" : decisionScore >= 50 ? "#b46b08" : "#c43d5e";
      const p0Opps = _opps.filter(function(d) { return d.priority === "P0"; });
      const p1Opps = _opps.filter(function(d) { return d.priority === "P1"; });
      const p2Opps = _opps.filter(function(d) { return d.priority === "P2"; });
      const coreOpp = p0Opps.length ? p0Opps[0] : _opps[0];
      const topFindings = findings.slice(0, 3);

      // 第2-5章结论数据
      function chConc(title, finding, risk, opportunity) {
        return '<div class="chapter-conclusion"><b>' + title + '</b>' +
          '<div class="ch-c-grid">' +
          '<div class="ch-c-item ch-c-find"><b>关键发现</b><p>' + finding + '</p></div>' +
          '<div class="ch-c-item ch-c-risk"><b>关键风险</b><p>' + risk + '</p></div>' +
          '<div class="ch-c-item ch-c-opp"><b>关键机会</b><p>' + opportunity + '</p></div>' +
          '</div></div>';
      }

      // 证据引用标注
      function evTag(id) { return ' <a href="#appx-' + id + '" class="evidence-tag" data-evidence="' + id + '" onclick="var el=document.getElementById(\"appx-' + id + '\");if(el)el.scrollIntoView({behavior:\"smooth\",block:\"center\"});return false">' + id + '</a>'; }

      // 综合评分排名（与 Agent 4 对比分析视图完全一致）
      function marketScoreTable() {
        var rankClass = function(rank) { return rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other'; };
        var recommendClass = function(rec) { return rec && rec.includes('建议进入') ? 'recommend-enter' : rec && rec.includes('可以进入') ? 'recommend-consider' : rec && rec.includes('谨慎') ? 'recommend-caution' : 'recommend-no'; };
        var sorted = _sr.slice().sort(function(a, b) { return b.total - a.total; });
        return '<div class="compare-scale"><h3>综合评分排名（满分100分）</h3><p class="muted" style="margin:6px 0 10px;font-size:14px">把光标放置在评分维度上以显示评分逻辑</p><table class="matrix"><thead><tr><th style="width:36px;text-align:center">排名</th><th>产品</th><th><span class="tip" data-tip="相应产品在市场中的占比，用于衡量其市场地位。市场份额占比越高，在该维度的得分越高。">市场份额</span></th><th><span class="tip" data-tip="相应产品单位时间内的销售额，用于衡量其热销程度。销售额增长速度越快，在该维度的得分越高。">热销程度</span></th><th><span class="tip" data-tip="相应产品与市面上其他产品的同质化程度。同质化程度越低（即差异化越明显），在该维度的得分越高。">去同质化</span></th><th><span class="tip" data-tip="相应产品的专利、独家技术含量等，用于衡量其不可复制性。核心技术越难以模仿，在该维度的得分越高。">独家技术</span></th><th><span class="tip" data-tip="相应产品的单位利润，用于衡量产品的盈利能力。单位利润越高，在该维度的得分越高。">利润率</span></th><th>总分</th><th>建议</th></tr></thead><tbody>' +
          sorted.map(function(item, idx) {
            return '<tr><td style="text-align:center"><span class="rank-badge ' + rankClass(idx + 1) + '">' + (idx + 1) + '</span></td><td><b>' + item.name + '</b></td><td>' + item.marketShare + '</td><td>' + item.salesHeat + '</td><td>' + item.homogeneity + '</td><td>' + item.exclusiveTech + '</td><td>' + item.profitRate + '</td><td><b style="font-size:16px">' + item.total + '</b></td><td>' + (item.name.indexOf('我方') >= 0 ? '<span class="recommend-tag ' + recommendClass(item.recommend) + '">' + (item.recommend || '可以进入') + '</span>' : '') + '</td></tr>';
          }).join("") +
          '</tbody></table><p class="muted" style="margin-top:8px;font-size:12px">评分口径：市场份额·热销程度·去同质化·独家技术·利润率，各维度满分20分，总计100分。我方产品80-100分建议进入，70-79分可以进入，50-69分谨慎进入，0-49分不建议进入。</p></div>';
      }

      // 波士顿矩阵（与 Agent 4 对比分析视图完全一致）
      function bcgMatrixView() {
        return '<div class="compare-scale"><h3>波士顿矩阵定位</h3><div class="bcg-matrix">' +
          '<span class="bcg-label" style="left:12px;bottom:8px">' + (_bcg.xLabel || '市场占有率') + '</span>' +
          '<span class="bcg-label" style="left:12px;bottom:26px">' + (_bcg.yLabel || '市场增长率') + '</span>' +
          '<span class="bcg-quadrant-label" style="left:15%;top:15%">明星</span>' +
          '<span class="bcg-quadrant-label" style="right:15%;top:15%">问题</span>' +
          '<span class="bcg-quadrant-label" style="left:15%;bottom:15%">现金牛</span>' +
          '<span class="bcg-quadrant-label" style="right:15%;bottom:15%">瘦狗</span>' +
          _bcg.products.map(function(p) { return '<span class="bcg-point" style="left:' + p.x + '%;bottom:' + p.y + '%;background:' + p.color + '">' + p.name + '</span>'; }).join("") +
          '</div><p class="muted" style="margin-top:8px;font-size:12px">横轴：市场占有率；纵轴：市场增长率。建议优先关注明星和问号象限。</p></div>';
      }

      // SWOT 视图（与 Agent 4 对比分析视图完全一致，含评论文本）
      function swotView() {
        return '<div class="compare-scale"><h3>SWOT分析（满分10分）</h3><div class="swot-grid">' +
          _swot.map(function(item) {
            return '<div class="swot-card"><h4>' + item.product + '</h4>' +
              '<div class="swot-item"><span><b>S</b> 优势</span><span class="swot-score" style="color:var(--green)">' + item.S.score + '/10</span></div>' +
              '<div style="font-size:12px;color:var(--muted);margin-bottom:6px">' + (item.S.comment || '') + '</div>' +
              '<div class="swot-item"><span><b>W</b> 劣势</span><span class="swot-score" style="color:var(--red)">' + item.W.score + '/10</span></div>' +
              '<div style="font-size:12px;color:var(--muted);margin-bottom:6px">' + (item.W.comment || '') + '</div>' +
              '<div class="swot-item"><span><b>O</b> 机会</span><span class="swot-score" style="color:var(--blue)">' + item.O.score + '/10</span></div>' +
              '<div style="font-size:12px;color:var(--muted);margin-bottom:6px">' + (item.O.comment || '') + '</div>' +
              '<div class="swot-item"><span><b>T</b> 威胁</span><span class="swot-score" style="color:var(--amber)">' + item.T.score + '/10</span></div>' +
              '<div style="font-size:12px;color:var(--muted)">' + (item.T.comment || '') + '</div>' +
              '</div>';
          }).join("") +
          '</div></div>';
      }

      // 六维痛点分析（与 Agent 4 对比分析视图完全一致）
      function painHeatmap() {
        return '<div class="compare-scale"><h3>六维痛点分析</h3><div class="painpoint-grid" style="grid-template-columns: 72px repeat(6, minmax(90px, 1fr));">' +
          '<div class="pp-head">产品</div>' +
          '<div class="pp-head">产品故障</div>' +
          '<div class="pp-head">结构/组装问题</div>' +
          '<div class="pp-head">设计/功能缺陷</div>' +
          '<div class="pp-head">外观/材质问题</div>' +
          '<div class="pp-head">与描述不符</div>' +
          '<div class="pp-head">物流/服务问题</div>' +
          [{ name: '美的', key: 'midea' }, { name: '九阳', key: 'joyoung' }, { name: '苏泊尔', key: 'supor' }, { name: '小熊', key: 'bear' }, { name: '我方', key: 'ours' }].map(function(product) {
            return '<div class="pp-head">' + product.name + '</div>' +

                var value = row[product.key];
                var cls = value.indexOf('高') >= 0 ? 'pp-high' : value.indexOf('中') >= 0 ? 'pp-mid' : 'pp-low';
                return '<div class="' + cls + '">' + value + '</div>';
              }).join("");
          }).join("") +
          '</div><p class="muted" style="margin-top:8px;font-size:12px">严重等级：高（红）、中（黄）、低（绿）。高中等级需备注具体痛点。</p></div>';
      }

      // 核心功能对比（与 Agent 4 对比分析视图完全一致，含说明列）
      function featureCompareTable() {
        var f = _features.features;
        var scoreClass = function(s) { return s >= 8 ? 'score-high' : s >= 6 ? 'score-mid' : 'score-low'; };
        return '<div class="compare-scale"><h3>核心功能对比（满分10分）</h3><table class="matrix feature-compare-table"><thead><tr><th>功能</th><th>说明</th><th>美的</th><th>九阳</th><th>苏泊尔</th><th>小熊</th><th>我方</th></tr></thead><tbody>' +
          f.map(function(feat) {
            return '<tr><td><b>' + feat.name + '</b></td><td><small>' + feat.desc + '</small></td>' +
              '<td class="score-cell ' + scoreClass(feat.midea.score) + '">' + feat.midea.score + '<br><small>' + (feat.midea.param || '') + '</small></td>' +
              '<td class="score-cell ' + scoreClass(feat.joyoung.score) + '">' + feat.joyoung.score + '<br><small>' + (feat.joyoung.param || '') + '</small></td>' +
              '<td class="score-cell ' + scoreClass(feat.supor.score) + '">' + feat.supor.score + '<br><small>' + (feat.supor.param || '') + '</small></td>' +
              '<td class="score-cell ' + scoreClass(feat.bear.score) + '">' + feat.bear.score + '<br><small>' + (feat.bear.param || '') + '</small></td>' +
              '<td class="score-cell ' + scoreClass(feat.ours.score) + '">' + feat.ours.score + '<br><small>' + (feat.ours.param || '') + '</small></td>' +

      function trafficTable() {

      // 对比量尺 (来自 comparisonScales)
      function compareScaleView(scale) {
        return '<div class="compare-scale"><h3>' + scale.title + '</h3><table class="matrix"><thead><tr><th>指标</th><th>美的</th><th>九阳</th><th>苏泊尔</th><th>小熊</th><th>我方</th></tr></thead><tbody>' +
          scale.rows.map(function(r) {
            return '<tr><td><b>' + r.metric + '</b></td><td>' + r.midea + '</td><td>' + r.joyoung + '</td><td>' + r.supor + '</td><td>' + r.bear + '</td><td>' + r.ours + '</td></tr>';

      // 证据强度表
      function evidenceStrengthTable() {
        return '<table class="matrix"><thead><tr><th>结论</th><th>证据 ID</th><th>证据强度</th><th>风险边界</th></tr></thead><tbody>' +
          _evidences.map(function(ec) {
            var confLabel = ec.confidence === "中高" ? "中高" : ec.confidence === "中" ? "中" : "低";
            var confCls = ec.confidence === "中高" ? "cell-ok" : ec.confidence === "中" ? "cell-mid" : "cell-bad";
            return '<tr><td>' + ec.claim.substring(0, 40) + '...</td><td>' + ec.id + '</td><td class="' + confCls + '">' + confLabel + '</td><td>需补充用户验证</td></tr>';
          }).join("") +
          '</tbody></table>';

      // QA 状态
      function qaSummary() {
        var blockers = qualityIssues.blockers.length;
        var warnings = qualityIssues.warnings.length;
        var passed = qualityIssues.passed.length;
        var canDeliver = getFinalDeliveryGate().canDeliver;
        return '<div class="qa-summary">' +
          '<div class="risk-card ' + (canDeliver ? "green" : "red") + '"><b>QA 结论：' + (canDeliver ? "有条件通过 (PASS with Warnings)" : "存在阻断问题 (BLOCKED)") + '</b>' +
          '<p>阻断问题：' + blockers + ' 个 | 警告：' + warnings + ' 个 | 通过：' + passed + ' 项</p></div>' +
          '<h4>通过项</h4><ul>' + qualityIssues.passed.map(function(p) { return '<li>' + p + '</li>'; }).join("") + '</ul>' +
          (warnings ? '<h4>警告项</h4><ul>' + qualityIssues.warnings.map(function(w) { return '<li>' + w.title + ' — ' + w.action + '</li>'; }).join("") + '</ul>' : '') +
          (blockers ? '<h4>阻断项</h4><ul>' + qualityIssues.blockers.map(function(b) { return '<li>' + b.title + ' — ' + b.action + '</li>'; }).join("") + '</ul>' : '') +
          '<p><b>版本记录：</b>' + analysisTask.currentVersionId + '（初始版本），基于当前可用的公开数据生成。</p>' +

            <p><b>内容洼地分析：</b>竞品的营销策略存在一个结构性盲区：它们把预算集中在可量化、可复制的付费搜索上，却忽略了内容侧的差异化机会。「小家庭菜谱」「好物测评」等内容形态在抖音的自然流量表现优于传统卖点展示——这说明消费者正在从「搜索比价」转向「内容决策」，而竞品的内容供给远远跟不上。</p>
            <p><b>冷启动策略：</b>新品早期应抓住竞品的内容洼地，以「小家庭菜谱」系列内容在抖音和小红书做场景化种草。逻辑是：先让用户「看到场景→产生兴趣」，然后在天猫/京东旗舰店完成「搜索验证→下单」。这个路径的获客成本远低于付费搜索，且积累的 UGC 内容可以持续降低后续的获客边际成本。</p>

        ignoreIssue: "已忽略该问题，并要求在最终报告中保留忽略原因和风险边界。"
      };
      if (action === "openPlanContext") {
        setContextCollapsed(false);
        return;
      }
      if (action === "openContext") {
        setContextCollapsed(false);
        return;
      }
      if (action === "closeContext") {
        setContextCollapsed(true);
        return;
      }
      if (action === "toggleContext") {
        toggleContextPanel();
        return;
      }
      if (action === "addCustomDimension" || action === "addCustomSource") {
        const key = action === "addCustomDimension" ? "dimensions" : "sources";
        const input = document.getElementById(action === "addCustomDimension" ? "customDimension" : "customSource");
        const value = input?.value?.trim();
        if (!value) {
          addMessage("请先填写需要补充的内容。");
          return;
        }
        if (!taskInputSelection[key].includes(value)) taskInputSelection[key].push(value);
        renderAll();
        return;
      }
      if (action === "addSupplementLink") {
        addSupplementLink();
        return;
      }
      if (action === "applyStructuringResolution") {
        applyStructuringResolution();
        return;
      }
      if (action === "deferStructuringResolution") {
        addMessage("已保留当前规则选择。处理价格口径一致性后，才能进入对比分析。");
        return;
      }
      if (action === "reviewStructuringResolution") {
        runtime.page = "home";
        runtime.viewStage = "execution";
        runtime.viewAgent = "structuring";
        renderAll();
        return;

      if (action === "loadExample") {

        return;

        const message = document.getElementById(id)?.value?.trim();

        }

      }
      // 添加竞品：展开表单面板（Spec A）

        competitorFormOpen = true;
        competitorFormMode = "specify";

      // 取消竞品表单
      if (action === "cancelCompetitorForm") {
        competitorFormOpen = false;
        renderAll();
        return;
      }
      // 提交竞品表单（双模式：Spec A）

          }

          plan.competitors.push({
            name,
            type,
            typeLabel: typeLabels[type],
            source_origin: "user_input",
            reasoning: {
              price_match: false,
              audience_match: false,
              spec_comparable: false,
              status: `已自动采集：「${name}」的价格、规格、用户评价数据`

        } else {
          // ====== 模式B：条件推荐 ======
          const priceBand = document.getElementById("competitorPriceBand")?.value?.trim();
          const target = document.getElementById("competitorAudience")?.value?.trim();
          const purpose = document.getElementById("competitorPurpose")?.value?.trim();
          const params = document.getElementById("competitorParams")?.value?.trim();
          if (!priceBand && !target && !purpose && !params) {
            const errEl = document.getElementById("competitorFormError");

          }
          const typeLabels = { direct: "直接对标", upward: "上探竞品", reference: "参照竞品" };

          const taskPrice = (editableTask.priceRange || "");
          if (!priceBand || priceBand.includes("300") || priceBand.includes("500") || priceBand.includes("平价") || priceBand.includes("以内")) {
            candidates.push({
              name: "飞利浦 HD9200",
              type: "direct",
              reason: `系统推荐：价格带${priceBand || '平价'}区间内京东/天猫销量Top竞品，与目标${taskPrice || '未指定'}匹配度较高`
            });
          }
          if ((priceBand && (priceBand.includes("500") || priceBand.includes("800") || priceBand.includes("高端") || priceBand.includes("升级"))) || (purpose && (purpose.includes("高端") || purpose.includes("升级")))) {
            candidates.push({
              name: "九阳 KL-C5",
              type: "upward",
              reason: `系统推荐：上探价格带${priceBand || '高端'}，覆盖更多功能维度，适合「${purpose || '品质升级'}」目的`
            });
          }
          candidates.push({
            name: "小熊 DZG-C60A1",

          });
          const seen = new Set();
          const uniqueCandidates = candidates.filter(c => {
            if (seen.has(c.name)) return false;
            seen.add(c.name);
            return true;
          });
          uniqueCandidates.forEach(c => {
            plan.competitors.push({
              name: c.name,
              type: c.type,
              typeLabel: typeLabels[c.type],
              source_origin: "system_recommended",
              reasoning: {
                price_match: !!(priceBand && taskPrice),
                audience_match: !!target,
                spec_comparable: !!params,
                status: c.reason
              },
              userParams: { priceBand, targetAudience: target, purpose, extraParams: params }
            });
          });
        }
        competitorFormOpen = false;
        if (workflowState.planStep_competitorsConfirmed) {

      // 提交维度表单
      if (action === "submitDimensionForm") {

      }
      // 原有逻辑：修改任务描述重置（保留兼容）
      if (action === "editTaskDescOld") {

      }

        runtime.viewStage = "input";

        runtime.statusText = "等待生成分析计划";

        workflowState.skuConflictFixed = false;

        workflowState.rerunSummary = null;
        workflowState.lastHandoff = "任务规划 Agent → 信息采集 Agent：交接 SKU 清单、字段 Schema 和来源计划。";
        workflowState.planStep_taskConfirmed = false;

        workflowState.planStep_dimensionsConfirmed = false;
        reportVersions.splice(1);

    function renderDrawerState(state) {

    function openDrawer(title, subtitle, html, meta = {}, replace = false) {
      if (currentDrawerState && !replace) drawerStack.push(currentDrawerState);
      currentDrawerState = { title, subtitle, html, meta };
      renderDrawerState(currentDrawerState);
    }

    function closeDrawer() {
      document.getElementById("evidenceDrawer").classList.remove("open");

      renderDrawerState(currentDrawerState);

    function fallbackCopy(text, onDone) {
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      document.execCommand("copy");
      document.body.removeChild(area);
      onDone();
    }

    workflowState.collectingGapWaived = Boolean(workflowState.collectingGapWaived);

    function batch2SplitList(value) {
      return String(value || "").split(/[\n,，、;；]+/).map(function(item) { return item.trim(); }).filter(Boolean)
        .filter(function(item, index, arr) { return arr.indexOf(item) === index; });
    }

    function batch2OriginLabel(origin) {
      if (origin === "system_recommended") return '<span class="origin-tag origin-agent">Agent 补充</span>';
      if (origin === "user_added") return '<span class="origin-tag origin-user">用户新增</span>';
      return '<span class="origin-tag origin-user">用户输入</span>';
    }

    function batch2InferAudience() {
      const explicit = String(taskState.targetAudience || "").trim();
      if (explicit) return explicit;
      const corpus = [taskState.targetProduct, taskState.natural, taskState.purpose].join(" ");
      const match = corpus.match(/\d+\s*[-—~至]\s*\d+\s*人[^，。；]*/);
      return match ? match[0].trim() : "待任务规划 Agent 确认";
    }

    function batch2MatchCatalog(name) {
      return batch2CompetitorCatalog.find(function(item) {
        return item.name === name || item.name.includes(name) || name.includes(item.name) ||
          ["美的", "九阳", "苏泊尔", "小熊"].some(function(brand) { return name.includes(brand) && item.name.includes(brand); });
      });
    }

    function batch2DimensionSpec(name, origin) {
      const aliases = {
        "容量与规格": ["容量规格", "覆盖容量、尺寸、功率等基础规格", "商品页 / 详情页"],
        "核心功能": ["核心功能", "覆盖加热方式、菜单、安全与体验功能", "详情页 / 品牌官网"],
        "价格与促销": ["价格与促销", "覆盖标价、券后价、平台补贴与套餐", "价格与促销"],
        "核心卖点": ["核心卖点", "覆盖标题、主图与详情页第一卖点", "商品详情页"],
        "用户好评": ["用户好评", "覆盖高频正向主题与使用场景", "用户评价 / 商品问答"],
        "用户差评与痛点": ["用户差评与痛点", "覆盖 1-3 星评价、问答与高频痛点", "用户评价 / 商品问答"],
        "使用体验": ["使用体验", "覆盖操作、噪音、清洁与稳定性", "用户评价 / 问答"],
        "设计与材质": ["设计与材质", "覆盖外观、结构、涂层与材质", "详情页 / 用户评价"],
        "售后与服务": ["售后与服务", "覆盖保修、退换与售后承诺", "品牌官网 / 售后说明"]
      };
      const spec = aliases[name] || [name, "由用户补充的自定义比较维度", "待规划来源"];
      return { name: spec[0], coverage: spec[1], dataSource: spec[2], source_origin: origin };
    }

    function batch2SourceSpec(name, origin) {
      const purpose = {
        "电商商品页": ["核验 SKU 身份、基础参数和在售信息", "SKU / 容量 / 功率"],
        "商品详情页": ["提取核心卖点、结构设计和使用说明", "卖点 / 功能 / 材质"],
        "品牌官网": ["核验官方规格、技术说明与品牌口径", "官方参数 / 技术"],
        "价格与促销": ["记录标价、券后价、平台补贴和套餐", "价格 / 促销"],
        "用户评价": ["识别正负面主题和真实使用痛点", "好评 / 差评 / 痛点"],
        "商品问答": ["补充用户疑问、适用场景与规格确认", "问答 / 场景"],
        "售后说明": ["核验保修、退换和服务承诺", "售后 / 风险"]
      }[name] || ["补充当前分析所需资料", "自定义字段"];
      return { name: name, purpose: purpose[0], targetFields: purpose[1], source_origin: origin };
    }

    function batch2ResetPlanningConfirmations(reason) {
      workflowState.planStep_taskConfirmed = false;
      workflowState.planStep_competitorsConfirmed = false;
      workflowState.planStep_dimensionsConfirmed = false;
      workflowState.planningHandoff = null;
      workflowState.collectingHandoffAccepted = false;
      batch2PlanningState.lastDirtyReason = reason || "规划内容已更新";
    }

    function batch2SyncPlanningQA() {
      const competitors = plan.competitors || [];
      const dimensions = plan.dimensions || [];
      const sourceItems = batch2PlanningState.sourceItems || [];
      const rules = [];
      const issues = [];
      const taskReady = Boolean(editableTask.category && editableTask.priceRange && editableTask.reportPurpose && editableTask.decisionQuestion);
      rules.push({ ruleName: "任务理解与目标匹配度", status: taskReady ? "PASS" : "FAIL", reason: taskReady ? "品类、价格带、报告用途与决策问题均已明确。" : "任务关键信息仍有缺失。" });
      const compStatus = competitors.length >= 1 && competitors.length <= 5 ? "PASS" : "FAIL";
      rules.push({ ruleName: "竞品范围与数量合理性", status: compStatus, reason: competitors.length === 0 ? "尚未设置竞品。" : competitors.length > 5 ? "竞品数量超过 5 个，建议收窄或分组。" : "竞品数量在 1-5 个范围内，并保留直接对标、上探与价格参照分层。" });
      const required = ["价格", "功能", "用户"];
      const missing = required.filter(function(token) { return !dimensions.some(function(item) { return item.name.includes(token) || item.coverage.includes(token); }); });
      rules.push({ ruleName: "分析维度完整性", status: dimensions.length >= 3 && missing.length === 0 ? "PASS" : "FAIL", reason: missing.length ? "缺少关键维度：" + missing.join("、") : "维度覆盖价格、功能和用户反馈等核心决策信息。" });
      rules.push({ ruleName: "来源计划可执行性", status: sourceItems.length >= 3 ? "PASS" : "FAIL", reason: sourceItems.length >= 3 ? "已为分析维度配置 " + sourceItems.length + " 类来源。" : "来源类型不足，建议至少配置商品页、价格和用户反馈来源。" });
      rules.filter(function(rule) { return rule.status === "FAIL"; }).forEach(function(rule) {
        issues.push({ violatedRule: rule.ruleName, issueLevel: rule.ruleName === "竞品范围与数量合理性" && competitors.length === 0 ? "blocker" : "warning", issueDesc: rule.reason, rollbackTarget: "planning", fixPrompt: "返回对应规划模块补充或调整后重新确认。" });
      });
      const hasBlocker = issues.some(function(issue) { return issue.issueLevel === "blocker"; });
      stageQAResults.planning.qaStatus = hasBlocker ? "BLOCK" : issues.length ? "WARNING" : "PASS";
      stageQAResults.planning.score = hasBlocker ? 45 : issues.length ? 76 : 94;
      stageQAResults.planning.checkedRules = rules;
      stageQAResults.planning.issues = issues;
      stageQAResults.planning.qaSummary = issues.length ? "规划质检发现 " + issues.length + " 项需要确认的内容。" : "规划质检通过，任务、竞品、维度和来源计划均可执行。";
    }

    function batch2SyncPlanningFromInput() {
      batch2Original.persistForm();
      const audienceEl = document.getElementById("targetAudience");
      if (audienceEl) taskState.targetAudience = audienceEl.value.trim();
      taskState.targetAudience = batch2InferAudience();
      taskState.natural = buildNaturalTaskFromInput();
      editableTask.summary = taskState.natural;
      editableTask.category = taskState.category || "待确认";
      editableTask.priceRange = taskState.priceRange || "待确认";
      editableTask.targetAudience = taskState.targetAudience;
      editableTask.reportPurpose = taskState.purpose || "待确认";
      editableTask.decisionQuestion = taskState.decisionQuestion || "待确认";

      const names = batch2SplitList(taskState.competitors);
      const rebuilt = names.map(function(name, index) {
        const known = batch2MatchCatalog(name);
        if (known) {
          const copy = JSON.parse(JSON.stringify(known));
          copy.name = name;
          copy.source_origin = "user_input";
          copy.confirmation_status = "pending";
          return copy;
        }
        return {
          name: name,
          type: "direct",
          typeLabel: "直接对标",
          source_origin: "user_input",
          confirmation_status: "pending",
          reasoning: { price_match: true, audience_match: true, spec_comparable: false, status: "用户指定竞品；型号和可比性将在采集阶段核验。" }
        };
      });
      if (rebuilt.length < 3) {
        const recommended = batch2CompetitorCatalog.find(function(item) { return !rebuilt.some(function(current) { return current.name.includes(item.name.split(" ")[0]); }); });
        if (recommended) {
          const copy = JSON.parse(JSON.stringify(recommended));
          copy.source_origin = "system_recommended";
          copy.confirmation_status = "pending";
          copy.reasoning.status = "Agent 补充：当前竞品数量偏少，建议加入代表性 SKU 以形成可比较范围。";
          rebuilt.push(copy);
        }
      }
      plan.competitors = rebuilt;

      const userDims = taskInputSelection.dimensions.slice();
      const neededDims = ["价格与促销", "用户差评与痛点"];
      const dimNames = userDims.slice();
      neededDims.forEach(function(name) { if (!dimNames.includes(name)) dimNames.push(name); });
      plan.dimensions = dimNames.map(function(name) { return batch2DimensionSpec(name, userDims.includes(name) ? "user_input" : "system_recommended"); });

      const userSources = taskInputSelection.sources.slice();
      const sourceNames = userSources.slice();
      ["商品问答", "售后说明"].forEach(function(name) { if (!sourceNames.includes(name)) sourceNames.push(name); });
      batch2PlanningState.sourceItems = sourceNames.map(function(name) { return batch2SourceSpec(name, userSources.includes(name) ? "user_input" : "system_recommended"); });
      plan.sources = sourceNames.slice();
      batch2PlanningState.generatedAt = new Date().toLocaleString("zh-CN", { hour12: false });
      batch2PlanningState.inputSnapshot = JSON.parse(JSON.stringify({
        category: taskState.category,
        priceRange: taskState.priceRange,
        purpose: taskState.purpose,
        targetAudience: taskState.targetAudience,
        competitors: names,
        dimensions: userDims,
        sources: userSources,
        attachments: attachmentSummary() || "无"
      }));
      workflowState.planningRevision += 1;
      batch2ResetPlanningConfirmations("根据首页输入生成新计划");
      batch2SyncPlanningQA();
      analysisTask.title = (taskState.category || "商品") + "商品竞品分析";
      analysisTask.objective = taskState.purpose;
      analysisTask.category = taskState.category;
      analysisTask.userInput = taskState.natural;
    }

    function batch2MarkPlanningDirty(reason) {
      batch2ResetPlanningConfirmations(reason);
      workflowState.planningRevision += 1;
      batch2SyncPlanningQA();
    }

    function batch2BuildPlanningHandoff() {
      batch2SyncPlanningQA();
      const qa = stageQAResults.planning;
      if (qa.qaStatus === "BLOCK") return null;
      const handoff = {
        contractVersion: "2.0",
        planningRevision: workflowState.planningRevision,
        confirmedAt: new Date().toLocaleString("zh-CN", { hour12: false }),
        task: {
          category: editableTask.category,
          priceRange: editableTask.priceRange,
          targetAudience: editableTask.targetAudience,
          reportPurpose: editableTask.reportPurpose,
          decisionQuestion: editableTask.decisionQuestion,
          summary: editableTask.summary
        },
        competitors: plan.competitors.map(function(item) { return { name: item.name, type: item.type, typeLabel: item.typeLabel, sourceOrigin: item.source_origin, reason: item.reasoning.status, confirmed: true }; }),
        dimensions: plan.dimensions.map(function(item) { return { name: item.name, coverage: item.coverage, dataSource: item.dataSource, sourceOrigin: item.source_origin, confirmed: true }; }),
        sources: batch2PlanningState.sourceItems.map(function(item) { return { name: item.name, purpose: item.purpose, targetFields: item.targetFields, sourceOrigin: item.source_origin, confirmed: true }; }),
        attachments: { links: taskAttachments.links.length, images: taskAttachments.images.length, files: taskAttachments.files.length, parsed: false },
        qaStatus: qa.qaStatus,
        nextAgent: "collecting"
      };
      workflowState.planningHandoff = handoff;
      workflowState.collectingHandoffAccepted = true;
      workflowState.lastHandoff = "任务规划 Agent → 信息采集 Agent：交接 " + handoff.competitors.length + " 个 SKU、" + handoff.dimensions.length + " 个维度、" + handoff.sources.length + " 类来源。";
      return handoff;
    }

    function batch2GetHandoff() {
      return workflowState.planningHandoff || batch2BuildPlanningHandoff();
    }

    function batch2ActiveSources() {
      const handoff = workflowState.planningHandoff;
      if (!handoff) return sources.slice();
      const names = handoff.competitors.map(function(item) { return item.name; });
      return sources.filter(function(source) {
        if (source.sku === "多 SKU 横向整理") return true;
        return names.some(function(name) {
          return source.sku === name || source.sku.includes(name) || name.includes(source.sku) || ["美的", "九阳", "苏泊尔", "小熊"].some(function(brand) { return name.includes(brand) && source.sku.includes(brand); });
        });
      });
    }

    function batch2CollectionRecords() {
      const handoff = batch2GetHandoff();
      const state = evaluateCollectingState();
      const active = batch2ActiveSources();
      return handoff.competitors.map(function(comp) {
        const matched = active.filter(function(source) {
          return source.sku === comp.name || source.sku.includes(comp.name) || comp.name.includes(source.sku) || ["美的", "九阳", "苏泊尔", "小熊"].some(function(brand) { return comp.name.includes(brand) && source.sku.includes(brand); });
        });
        let status = "collected";
        let statusLabel = "已采集";
        let note = matched.length ? "已绑定 " + matched.length + " 条来源" : "暂无已绑定来源";
        if (state === "EXECUTING") { status = "running"; statusLabel = "采集中"; note = matched.length ? "部分来源已返回" : "等待来源返回"; }
        else if (!matched.length) { status = "missing"; statusLabel = "缺失"; note = "未获得可用来源，需要补充链接或重新采集"; }
        else if (state === "BLOCKED_MANUAL_INTERVENTION" && comp.name.includes("苏泊尔")) { status = "blocked"; statusLabel = "冲突"; note = "标价、券后价与套餐价存在口径冲突"; }
        else if (state === "SUCCESS_CONFIRMED" && comp.name.includes("小熊") && !workflowState.collectingGapResolved) { status = "warning"; statusLabel = "带缺口"; note = "公开评价可用，但缺少长期耐用与真实售后数据"; }
        const fields = Array.from(new Set(matched.flatMap(function(source) { return source.fields || []; })));
        return { name: comp.name, typeLabel: comp.typeLabel, status: status, statusLabel: statusLabel, note: note, sourceIds: matched.map(function(source) { return source.id; }), fields: fields };
      });
    }

    function batch2SyncCollectingQA() {
      const state = evaluateCollectingState();
      const records = batch2CollectionRecords();
      const missing = records.filter(function(item) { return item.status === "missing"; });
      const blocked = records.filter(function(item) { return item.status === "blocked"; });
      const warnings = records.filter(function(item) { return item.status === "warning"; });
      const rules = [];
      const issues = [];
      const handoff = batch2GetHandoff();
      rules.push({ ruleName: "规划交接一致性", status: records.length === handoff.competitors.length ? "PASS" : "FAIL", reason: "采集目标与已确认竞品范围 " + records.length + "/" + handoff.competitors.length + " 对齐。" });
      if (state === "EXECUTING") {
        rules.push({ ruleName: "字段获取率", status: "PASS", reason: "采集仍在执行中，完成后重新计算字段覆盖。" });
        rules.push({ ruleName: "来源有效性", status: "PASS", reason: "已返回来源均绑定抓取时间和可信度。" });
        stageQAResults.collecting.qaStatus = "PASS";
        stageQAResults.collecting.score = 0;
        stageQAResults.collecting.qaSummary = "采集执行中，QA 将在全部 Skill 完成后验收。";
      } else {
        const coverageStatus = missing.length || blocked.length ? "FAIL" : warnings.length ? "FAIL" : "PASS";
        rules.push({ ruleName: "字段获取率", status: coverageStatus, reason: blocked.length ? blocked.length + " 个 SKU 存在冲突字段。" : missing.length ? missing.length + " 个 SKU 缺少可用来源。" : warnings.length ? warnings.length + " 个 SKU 存在非阻断信息缺口。" : "全部 SKU 已获得可进入结构化处理的资料。" });
        rules.push({ ruleName: "来源有效性", status: "PASS", reason: "当前来源均记录平台、抓取时间、可信度和支撑字段。" });
        rules.push({ ruleName: "缺失/失败/冲突分类", status: "PASS", reason: "采集结果已分别标记为已采集、信息缺口、采集失败或字段冲突。" });
        blocked.forEach(function(item) { issues.push({ violatedRule: "字段获取率", issueLevel: "blocker", issueDesc: item.name + "：" + item.note, rollbackTarget: "collecting", fixPrompt: "补充官方商品页和价格快照，并明确单品价、活动价与套餐价。" }); });
        missing.forEach(function(item) { issues.push({ violatedRule: "字段获取率", issueLevel: "blocker", issueDesc: item.name + "：" + item.note, rollbackTarget: "collecting", fixPrompt: "补充商品链接或移出本轮竞品范围。" }); });
        warnings.forEach(function(item) { issues.push({ violatedRule: "字段获取率", issueLevel: "warning", issueDesc: item.name + "：" + item.note, rollbackTarget: "collecting", fixPrompt: "保留为信息缺口，在报告中降低结论强度。" }); });
        stageQAResults.collecting.qaStatus = blocked.length || missing.length ? "BLOCK" : issues.length ? "WARNING" : "PASS";
        stageQAResults.collecting.score = blocked.length || missing.length ? 48 : issues.length ? 82 : 92;
        stageQAResults.collecting.qaSummary = stageQAResults.collecting.qaStatus === "BLOCK" ? "采集质检发现阻断：存在缺失来源或字段冲突。" : stageQAResults.collecting.qaStatus === "WARNING" ? "采集完成，无阻断；存在 " + issues.length + " 项非阻断信息缺口。" : "采集质检通过，范围、来源和字段状态均已对齐。";
      }
      stageQAResults.collecting.checkedRules = rules;
      stageQAResults.collecting.issues = issues;
      if (state === "EXECUTING") collectingWarnings.splice(0);
      else if (stageQAResults.collecting.qaStatus === "WARNING") collectingWarnings.splice(0, collectingWarnings.length, { sku: warnings[0] ? warnings[0].name : "当前资料包", field: "信息缺口", note: warnings[0] ? warnings[0].note : "存在非阻断信息缺口。", sourceId: warnings[0] && warnings[0].sourceIds[0] ? warnings[0].sourceIds[0] : "S004" });
      else collectingWarnings.splice(0);
      if (runtime.stage === "collecting") {
        runtime.qualityText = state === "EXECUTING" ? "采集完成后自动验收" : stageQAResults.collecting.qaStatus === "BLOCK" ? "QA 阻断" : stageQAResults.collecting.qaStatus === "WARNING" ? "带风险通过" : "QA 已通过";
      }
    }

    function batch2RenderSourcePlan() {
      const items = batch2PlanningState.sourceItems || [];
      return '<div style="margin-top:18px;padding-top:16px;border-top:1px solid var(--line)">'
        + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px"><div><h3 style="margin-bottom:4px">信息来源计划</h3><p class="input-helper">用户选择的来源与 Agent 补充来源分开标记；确认后将作为信息采集 Agent 的输入合同。</p></div><span class="status-tag">' + items.length + ' 类来源</span></div>'
        + '<div class="plan-source-list">' + items.map(function(item) { return '<div class="plan-source-item"><div><b>' + escapeHtml(item.name) + '</b><div style="margin-top:4px">' + batch2OriginLabel(item.source_origin) + '</div></div><p>' + escapeHtml(item.purpose) + '</p><p><b>目标字段：</b>' + escapeHtml(item.targetFields) + '</p><button class="text-button" type="button" data-plan-remove-source="' + escapeHtml(item.name) + '" style="color:var(--red)">移除</button></div>'; }).join("") + '</div>'
        + '<div class="button-row" style="margin-top:10px"><input id="planSourceName" placeholder="补充来源，例如：抖音商品页"><button class="btn" type="button" data-workflow-action="addPlanSource">添加来源</button></div>'
        + '</div>';
    }

    function batch2RenderHandoffContract() {
      const handoff = batch2GetHandoff();
      const attachments = handoff.attachments;
      return '<div class="handoff-contract">'
        + '<div class="handoff-contract-head"><div><h3>已接收任务规划交接</h3><p>以下内容来自用户输入、Agent 补充与三步确认结果；信息采集只按此范围执行。</p></div><span class="origin-tag origin-confirmed">Revision ' + handoff.planningRevision + '</span></div>'
        + '<div class="handoff-contract-grid">'
        + '<div class="handoff-contract-item"><span>竞品范围</span><b>' + handoff.competitors.length + ' 个 SKU</b></div>'
        + '<div class="handoff-contract-item"><span>分析维度</span><b>' + handoff.dimensions.length + ' 个维度</b></div>'
        + '<div class="handoff-contract-item"><span>来源计划</span><b>' + handoff.sources.length + ' 类来源</b></div>'
        + '<div class="handoff-contract-item"><span>用户资料</span><b>' + (attachments.links + attachments.images + attachments.files) + ' 项（未解析）</b></div>'
        + '</div><div class="collection-state-legend"><span>目标：' + escapeHtml(handoff.task.category) + '</span><span>价格带：' + escapeHtml(handoff.task.priceRange) + '</span><span>人群：' + escapeHtml(handoff.task.targetAudience) + '</span></div></div>';
    }

    function batch2RenderCollectionCoverage() {
      const records = batch2CollectionRecords();
      const state = evaluateCollectingState();
      const counts = records.reduce(function(acc, item) { acc[item.status] = (acc[item.status] || 0) + 1; return acc; }, {});

        return;
      }
      // 竞品类型单选按钮：更新 active 类和 competitorFormData.type
      const radioLabel = event.target.closest(".inline-form-radio");
      if (radioLabel) {
        const radio = radioLabel.querySelector('input[type="radio"]');
        if (radio) {
          // 移除所有兄弟标签的 active 类
          const parent = radioLabel.parentElement;
          if (parent) {
            parent.querySelectorAll(".inline-form-radio").forEach(el => el.classList.remove("active"));
          }
          radioLabel.classList.add("active");
          competitorFormData.type = radio.value;
        }
        return;
      }
      const pageButton = event.target.closest("[data-page]");
      if (pageButton) {
        event.preventDefault();
        goTo(pageButton.dataset.page);
        return;
      }
      const actionButton = event.target.closest("[data-workflow-action]");
      if (actionButton) {
        event.preventDefault();
        handleWorkflowAction(actionButton.dataset.workflowAction);
        return;
      }
      const qaIssueButton = event.target.closest("[data-qa-issue]");
      if (qaIssueButton) {
        event.preventDefault();
        openQADrawer(qaIssueButton.dataset.qaIssue);
        return;
      }
      const qaStageButton = event.target.closest("[data-qa-stage]");
      if (qaStageButton) {
        event.preventDefault();
        openQADrawer("", qaStageButton.dataset.qaStage);
        return;
      }
      const qaDrawerButton = event.target.closest("[data-qa-drawer]");
      if (qaDrawerButton) {
        event.preventDefault();
        openQADrawer();
        return;
      }
      const qaAcceptButton = event.target.closest("[data-qa-accept]");
      if (qaAcceptButton) {
        event.preventDefault();
        handleQAAccept(qaAcceptButton.dataset.qaAccept);
        return;
      }
      const qaRejectButton = event.target.closest("[data-qa-reject]");
      if (qaRejectButton) {
        event.preventDefault();
        handleQAReject(qaRejectButton.dataset.qaReject);
        return;
      }
      const qaForcePassButton = event.target.closest("[data-qa-force-pass]");
      if (qaForcePassButton) {
        event.preventDefault();
        handleQAForcePass(qaForcePassButton.dataset.qaForcePass);
        return;
      }
      const qaSubmitFeedbackButton = event.target.closest("[data-qa-submit-feedback]");
      if (qaSubmitFeedbackButton) {
        event.preventDefault();
        var actionId = qaSubmitFeedbackButton.dataset.qaSubmitFeedback;
        var input = document.querySelector('[data-qa-feedback-input="' + actionId + '"]');
        handleQASubmitFeedback(actionId, input ? input.value : "");
        return;
      }
      const qaStageDetailButton = event.target.closest("[data-qa-stage-detail]");
      if (qaStageDetailButton) {
        event.preventDefault();
        openQAStageDetail(qaStageDetailButton.dataset.qaStageDetail);
        return;
      }
      const metricButton = event.target.closest("[data-metric]");
      if (metricButton) {
        event.preventDefault();
        openMetric(metricButton.dataset.metric);
        return;
      }
      const sourceButton = event.target.closest("[data-source]");
      if (sourceButton) {
        event.preventDefault();
        openSourceDetail(sourceButton.dataset.source);
        return;
      }
      const evidenceButton = event.target.closest("[data-evidence]");
      if (evidenceButton) {
        event.preventDefault();
        openEvidence(evidenceButton.dataset.evidence);
        return;
      }
      const sourceLibraryButton = event.target.closest("[data-open-source-library]");
      if (sourceLibraryButton) {
        event.preventDefault();
        openSourceLibrary();
        return;
      }
      const impactButton = event.target.closest("[data-impact]");
      if (impactButton) {
        event.preventDefault();
        openImpactDrawer(impactButton.dataset.impact);
        return;
      }
      const versionButton = event.target.closest("[data-version-drawer]");
      if (versionButton) {
        event.preventDefault();
        openVersionDrawer();
        return;
      }
      const versionDetailButton = event.target.closest("[data-version-detail]");
      if (versionDetailButton) {
        event.preventDefault();
        openVersionDetail(versionDetailButton.dataset.versionDetail);
        return;
      }
      // 竞品移除（Spec 六）
      const planRemoveBtn = event.target.closest("[data-plan-remove]");
      if (planRemoveBtn) {
        event.preventDefault();
        const removeName = planRemoveBtn.dataset.planRemove;
        const beforeCount = plan.competitors.length;
        plan.competitors = plan.competitors.filter(item => item.name !== removeName);
        if (plan.competitors.length < beforeCount) {
          if (workflowState.planStep_competitorsConfirmed) {
            workflowState.planStep_competitorsConfirmed = false;
            workflowState.planStep_dimensionsConfirmed = false;
          }
          renderAll();
        }
        return;
      }
      // 维度移除（Spec 六）
      const planRemoveDimBtn = event.target.closest("[data-plan-remove-dim]");
      if (planRemoveDimBtn) {
        event.preventDefault();
        const removeDimName = planRemoveDimBtn.dataset.planRemoveDim;
        const beforeCount = plan.dimensions.length;
        plan.dimensions = plan.dimensions.filter(dim => dim.name !== removeDimName);
        if (plan.dimensions.length < beforeCount) {
          if (workflowState.planStep_dimensionsConfirmed) {
            workflowState.planStep_dimensionsConfirmed = false;
          }
          renderAll();
        }
        return;
      }
      // 确认任务理解（Spec 4-C）
      const planConfirmTaskBtn = event.target.closest("[data-plan-confirm-task]");
      if (planConfirmTaskBtn) {
        event.preventDefault();
        workflowState.planStep_taskConfirmed = true;
        renderAll();
        return;
      }
      // 确认竞品范围（Spec 4-C）
      const planConfirmCompetitorsBtn = event.target.closest("[data-plan-confirm-competitors]");
      if (planConfirmCompetitorsBtn) {
        event.preventDefault();
        workflowState.planStep_competitorsConfirmed = true;
        renderAll();
        return;
      }
      // 确认分析维度 → 进入采集阶段（Spec 4-C）
      const planConfirmDimensionsBtn = event.target.closest("[data-plan-confirm-dimensions]");
      if (planConfirmDimensionsBtn) {
        event.preventDefault();
        workflowState.planStep_dimensionsConfirmed = true;
        batch2BuildPlanningHandoff();
        runtime.statusText = "任务规划已完成，等待开始采集";
        runtime.qualityText = "规划质检已通过";
        renderAll();
        return;
      }
      const agentButton = event.target.closest("[data-agent-jump]");
      if (agentButton) {
        event.preventDefault();
        goToAgent(agentButton.dataset.agentJump);
        return;
      }
      const demoSnapshotBtn = event.target.closest("[data-demo-snapshot]");
      if (demoSnapshotBtn) {
        event.preventDefault();
        collectingSnapshotKey = demoSnapshotBtn.dataset.demoSnapshot;
        batch2SyncCollectingQA();
        const cs = evaluateCollectingState();
        runtime.statusText = cs === 'EXECUTING' ? '信息采集 Agent 正在执行 4 个并行 Skill'
          : stageQAResults.collecting.qaStatus === 'BLOCK' ? '采集完成，存在阻断问题'
          : stageQAResults.collecting.qaStatus === 'WARNING' ? '数据采集已完成，存在非阻断信息缺口'
          : '数据采集已完成';
        runtime.qualityText = getStageQA('collecting').label;
        renderAll();
        return;
      }
      if (["copyReport", "copyReportInline", "copyReportSide"].includes(event.target.id)) {
        event.preventDefault();
        copyReport(event.target);
        return;
      }
      if (["downloadReport", "downloadReportFinal"].includes(event.target.id)) {
        event.preventDefault();
        downloadReport();
        return;
      }
      if (event.target.id === "drawerClose" || event.target.id === "evidenceOverlay") {
        closeDrawer();
        return;
      }
      if (event.target.id === "drawerBack") {
        goBackDrawer();
      }
    });



    document.addEventListener("click", function(event) {
      const removeSource = event.target.closest("[data-plan-remove-source]");
      if (removeSource) {
        const name = removeSource.dataset.planRemoveSource;
        batch2PlanningState.sourceItems = batch2PlanningState.sourceItems.filter(function(item) { return item.name !== name; });
        plan.sources = batch2PlanningState.sourceItems.map(function(item) { return item.name; });
        batch2MarkPlanningDirty("来源计划已调整");
        renderAll();
        return;
      }
      if (event.target.closest("[data-plan-remove]")) {
        batch2MarkPlanningDirty("竞品范围已调整");
        renderAll();
      }
      if (event.target.closest("[data-plan-remove-dim]")) {
        batch2MarkPlanningDirty("分析维度已调整");
        renderAll();
      }
      if (event.target.closest("[data-plan-confirm-task]")) {
        batch2SyncPlanningQA();
      }
      if (event.target.closest("[data-plan-confirm-competitors]")) {
        batch2SyncPlanningQA();
      }
    });

    document.addEventListener("change", (event) => {
      if (event.target.id === "supplementImages") {
        addAttachmentFiles("images", event.target.files);
      }
      if (event.target.id === "supplementFiles") {
        addAttachmentFiles("files", event.target.files);
      }
      if (event.target.matches("[data-structuring-decision]")) {
        var ruleKey = event.target.dataset.structuringDecision;
        if (structuringResolutionState[ruleKey]) {
          structuringResolutionState[ruleKey].decision = event.target.value;
          renderAll();
        }
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeDrawer();
    });

    const initialPage = location.hash.replace("#", "") || "home";
    if (initialPage === "qa-dashboard") runtime.page = "qa-dashboard";
    if (initialPage === "final" && runtime.reportGenerated) runtime.page = "final";
    if (initialPage === "final" && !runtime.reportGenerated) runtime.messages.push("尚未生成最终报告，已返回工作台。");
    renderAll();
  </script>
  <script>document.write('<script src="' + (location.protocol === "file:" ? "./" : "/frontend/") + 'batch3_0.js"><\/script>');</script>
  <script>document.write('<script src="' + (location.protocol === "file:" ? "./" : "/frontend/") + 'batch3a_lite.js"><\/script>');</script>
  <script>document.write('<script src="' + (location.protocol === "file:" ? "./" : "/frontend/") + 'batch3a1.js"><\/script>');</script>
  <script>document.write('<script src="' + (location.protocol === "file:" ? "./" : "/frontend/") + 'batch3a2.js"><\/script>');</script>
  <script>document.write('<script src="' + (location.protocol === "file:" ? "./" : "/frontend/") + 'batch3b_lite.js"><\/script>');</script>
</body>
</html>
